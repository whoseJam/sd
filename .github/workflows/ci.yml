name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    name: format / lint / build / gen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: pnpm install --frozen-lockfile

      - run: pnpm check:format
        name: oxfmt --check

      - run: pnpm check:lint
        name: oxlint

      - run: pnpm -r build
        name: tsup build all packages

      - run: pnpm check:gen
        name: sd-agents source vs dist drift
