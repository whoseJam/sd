<section>
    <section>
        <h1>奶酪</h1>
    </section>
    <problem data-source="https://www.luogu.com.cn/problem/P3958"></problem>
    <section>
        <h2>奶酪</h2>
        <iframe data-animation="./样例解释.js"
            data-description="样例解释"
            style="width: 1000px; height: 300px;"></iframe>
        <p>有 $n$ 个球形空洞分布在奶酪中</p>
        <p class="fragment">每个空洞坐标 $(x,y,z)$ 半径 $r$</p>
        <p class="fragment quote">老鼠能否从底部 $z=0$ 到顶部 $z=h$</p>
        <p class="fragment quote">如何判断从底部到顶部是否可达<span class="fragment">——判断顶部与底部是否连通</span></p>
    </section>
    <section>
        <h2>空洞相交</h2>
        <p>不妨从判断空洞能否相交开始...</p>
        <iframe data-animation="./空洞相交.js"
            data-description="空洞的距离关系"
            style="width: 1000px; height: 200px;"></iframe>
        <p class="fragment quote">$d\le 2r$，相交或相切</p>
        <p class="fragment">底部上边界视作特殊空洞</p>
        <p class="fragment">顶部下边界视作特殊空洞</p>
    </section>
    <section>
        <h2>连通性建模</h2>
        <p class="fragment">与底部相切合并到底部</p>
        <p class="fragment">与顶部相切合并到顶部</p>
        <p class="fragment">两空洞相交或相切互相合并</p>
        <p class="fragment quote">只需判断顶部与底部是否同一连通块</p>
        <iframe data-animation="./连通性构建.js" style="width: 1000px; height: 350px;"></iframe>
    </section>
</section>
