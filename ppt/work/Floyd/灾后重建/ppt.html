    <section>
        <h1>灾后重建</h1>
    </section>
    <problem data-source="https://www.luogu.com.cn/problem/P1119"></problem>
    <section>
        <h2>灾后重建</h2>
        <p>给出所有边，某些村庄最初被摧毁了，按照时间顺序每次重建一个村庄</p>
        <p class="fragment">最短路只能经过被修建好的村庄</p>
        <p class="fragment">对每个时间点，求任意两点之间的最短路</p>
    </section>
    <section>
        <h2>灾后重建</h2>
        <p>发现每次恢复一个村庄，正好和Floyd算法中枚举 $k$ 这个中转点类似</p>
        <ul>
            <li class="fragment">Floyd枚举到第 $k$ 个中转点时，只允许最短路经过 $1,2,...,k$ 这些中转点</li>
        </ul>
        <codeblock class="fragment">
            <script type="text/template">
                void Floyd() {
                    for (int k = 1; k <= n; k++)
                        for (int i = 1; i <= n; i++)
                            for (int j = 1; j <= n; j++)
                                d[i][j] = min(d[i][j], d[i][k] + d[k][j]);
                }
            </script>
        </codeblock>
        <ul>
            <li class="fragment">本题中如果村庄 $a_1,a_2...a_k$ 都被重建了，其他村庄还没被重建，则也只允许最短路经过 $a_1,a_2...a_{k}$ 这些村庄</li>
        </ul>
        <codeblock class="fragment">
            <script type="text/template">
                // 恢复村庄 u，等价于允许它作为中转点
                void Floyd(int u) {
                    for (int i = 0; i < n; i++)
                        for (int j = 0; j < n; j++)
                            d[i][j] = min(d[i][j], d[i][u] + d[u][j]);
                }
            </script>
        </codeblock>
    </section>
</section>
