    <section>
        <h2>威尔逊定理</h2>
        <p>
            若 $P$ 是一个素数，则 $(P-1)!=-1(mod\ P)$
        </p>
        <p class="fragment">
            也可以写作 $[(P-1)!+1]\% P = 0$
        </p>
