        <h2>X问题</h2>
        <p>
            题目要求有多少个 $x$，满足 $0\le x\le n$ 且：
            $$
            \left\{
            \begin{aligned}
            & x\equiv a_1(mod\ b_1) \\
            & x\equiv a_2(mod\ b_2) \\
            & ...... \\
            & x\equiv a_m(mod\ b_m)
            \end{aligned}
            \right.
            $$
        </p>
        <p class="fragment">我们先把 $x$ 的某个特解 $x_0$ 算出来，设 $d=lcm(b_1,b_2...b_m)$，那么通解形式为 $x=x_0+kd$，分析一下有多少个解会落在 $[0,n]$ 这个区间内即可</p>
