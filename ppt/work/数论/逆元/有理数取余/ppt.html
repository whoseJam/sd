    <section>
        <h2>有理数取余</h2>
        <p>如果 $b\equiv 0(mod\ 19260817)$，那么这个题无解</p>
        <p class="fragment">否则，注意到 $19260817$ 是一个质数，所以我们既可以使用Exgcd又能使用费马小定理去求 $b$ 的逆元 $inv_b$</p>
        <p class="fragment">把 $a\cdot inv_b \% 19260817$ 作为答案输出即可</p>
