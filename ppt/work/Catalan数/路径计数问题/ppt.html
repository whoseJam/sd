<section>
    <section>
        <h1>路径计数问题</h1>
    </section>
    <problem data-problemset="self" data-problemid="000004"></problem>
    <section>
        <h2>路径计数问题</h2>
        <iframe data-animation="./网格图.js"
            style="width: 1000px; height: 400px;"></iframe>
        <p>从左下角走到右上角，不能穿过红线（可以接触），求方案数</p>
        <p class="fragment">如果我们把<b>向上走</b>和<b>向右走</b>看作是两种操作......</p>
        <p class="fragment">那么边长为 $n$ 的网格图的答案显然就是Catalan数的第 $n$ 项<span class="fragment">，但本题的 $n\le 10^5$，显然不能用之前时间复杂度为 $O(n^2)$ 的递推</span></p>
    </section>
    <section>
        <h2>路径计数问题</h2>
        <p>
            $$
            合法方案数=总方案数-穿过红线的方案数
            $$
        </p>
        <ul>
            <li class="fragment">总方案数显然是 $C_{2n}^n$</li>
        </ul>
        <iframe data-animation="./穿过红线的方案.js" class="fragment"
            data-viewBoxDelta="0 -40 0 60"
            style="width: 1000px; height: 350px;"></iframe>
        <ul>
            <li class="fragment">穿越红线的方案数是 $C_{2n}^{n-1}$</li>
        </ul>
        <p class="fragment">$$H_n=C_{2n}^n-C_{2n}^{n-1}$$</p>
    </section>
</section>
