<section>
    <section>
        <h1>马拉松</h1>
    </section>
    <problem data-source="https://www.luogu.com.cn/problem/P3113"></problem>
    <section>
        <h2>马拉松</h2>
        <p>平面上有 $n$ 个地点</p>
        <iframe data-animation="./样例解释.js"
            style="width: 1000px; height: 250px;"></iframe>
        <p class="fragment">每次询问选定第 $l$ 个到第 $r$ 个地点，求顺次通过这些地点，允许跳过<b>恰好一个地点</b>的情况下，行走的最短距离</p>
        <p class="fragment quote">本题中定义两个点的距离为曼哈顿距离，即 $dis((x_1,y_1),(x_2,y_2))=|x_1-x_2|+|y_1-y_2|$</p>
    </section>
    <section>
        <h2>马拉松</h2>
        <iframe data-animation="./马拉松.js"
            style="width: 1000px; height: 350px;"></iframe>
        <p class="quote">我们能否用一条线段维护一段检查点的总路程长度？</p>
        <codeblock class="fragment">
            <script type="text/template">
                seg pushUp(seg lc, seg rc) {
                    ans.dis = lc.dis + rc.dis + dis(mid, mid + 1);
                }
            </script>
        </codeblock>
        <p class="fragment quote">如何维护<b style="color: red;">允许跳过恰好一个地点</b>的情况下，<b style="color: purple;"><ruby>节省的最大距离<rt>mdis</rt></ruby></b>？</p>
    </section>
    <section>
        <h2>马拉松</h2>
        <p class="quote">显然，跳过的那一个点可能来自于左区间或者右区间内部...</p>
        <div style="display: flex;">
            <iframe data-animation="./线段合并1.js"
                style="width: 1000px; height: 150px; margin-right: 30px;"></iframe>
            <iframe data-animation="./线段合并2.js"
                style="width: 1000px; height: 150px;"></iframe>
        </div>
        <p class="fragment quote">还有可能来自左区间的最右侧，或者右区间的最左侧...</p>
        <div style="display: flex;" class="fragment">
            <iframe data-animation="./线段合并3.js"
                style="width: 1000px; height: 130px; margin-right: 30px;"></iframe>
            <iframe data-animation="./线段合并4.js"
                style="width: 1000px; height: 130px;"></iframe>
        </div>
        <codeblock class="fragment">
            <script type="text/template">
                seg pushUp(seg lc, seg rc) {
                    ans.mdis = max(lc.mdis, rc.mdis);
                    ans.mdis = max(ans.mdis, evaluate(mid - 1 -> mid + 1));
                    ans.mdis = max(ans.mdis, evaluate(mid -> mid + 2));
                }
            </script>
        </codeblock>
    </section>
</section>
