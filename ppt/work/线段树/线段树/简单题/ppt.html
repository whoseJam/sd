    <problem data-source="https://www.luogu.com.cn/problem/P5057"></problem>
    <section>
        <h2>简单题</h2>
        <p>维护一个 $01$ 序列，支持</p>
        <ol>
            <li class="fragment"><code>Rev(l, r)</code>：将 $[l,r]$ 这段区间内的元素进行翻转</li>
            <li class="fragment"><code>Query(x)</code>：查询第 $x$ 个元素的值</li>
        </ol>
    </section>
    <section>
        <h2>简单题</h2>
        <p>不难想到在每个点上维护一个 $rev$ 标记，其中 $rev\in\{0,1\}$</p>
        <ul>
            <li class="fragment">为 $0$ 表示没有标记</li>
            <li class="fragment">为 $1$ 表示需要将子树内的所有元素进行翻转</li>
        </ul>
        <iframe data-animation="./rev标记分析.js"
            style="width: 1000px; height: 200px; margin-top: 20px;"></iframe>
        <codeblock class="fragment">
            <script type="text/template">
                void pushRev(int x) {
                    t[x].rev ^= 1;
                }
                void pushDown(int x) {
                    if (t[x].rev) {
                        pushRev(lc);
                        pushRev(rc);
                        t[x].rev = 0;
                    }
                }
            </script>
        </codeblock>
    </section>
</section>
