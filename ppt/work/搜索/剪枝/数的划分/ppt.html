<section>
    <section>
        <h1>数的划分</h1>
    </section>
    <problem data-problemset="luogu" data-problemid="P1025"></problem>
    <section>
        <h2>数的划分</h2>
        <p>构造 $k$ 个数字构成一个<b style="color: purple;">单调不下降序列</b>，使它们的和等于 $n$</p>
        <p>依据前面的练习，不难得出本题的问题定义</p>
        <codeblock class="fragment">
            <script type="text/template">
                // 假设构造到序列的第 d 个元素
                // 前 d-1 个元素已经确定了
                // 要把后面的 k-d+1 个元素枚举出来
                void divide(int d) {
                }
            </script>
        </codeblock>
        <sd-animation src="./问题定义.js" class="fragment"
            style="width: 1000px; height: 200px;"></sd-animation>
    </section>
    <section>
        <h2>数的划分</h2>
        <sd-animation src="./问题实现.js"
            style="width: 1000px; height: 200px;"></sd-animation>
        <codeblock class="fragment">
            <script type="text/template">
                int sum;
                vector< int > arr;
                void divide(int d) {
                    for (int i = arr.back(); i <= n; i++) {
                        if (sum + i <= n) {
                            sum += i; arr.push_back(i);
                            divide(d + 1);
                            sum -= i; arr.pop_back();
                        }
                    }
                }
            </script>
        </codeblock>
    </section>
    <section>
        <h2>数的划分</h2>
        <sd-animation src="./问题边界.js"
            style="width: 1000px; height: 200px;"></sd-animation>
        <codeblock class="fragment">
            <script type="text/template">
                int sum;
                vector< int > arr;
                void divide(int d) {
                    if (d == k + 1) {
                        // 检查 sum == n;
                        return;
                    }
                    for (int i = arr.back(); i <= n; i++) {
                        if (sum + i <= n) {
                            sum += i; arr.push_back(i);
                            divide(d + 1);
                            sum -= i; arr.pop_back();
                        }
                    }
                }
            </script>
        </codeblock>
    </section>
    <section>
        <h2>数的划分</h2>
        <div>
            <p style="font-size: 20px; text-align: center; margin-bottom: -10px;">$n=4,k=3$</p>
            <sd-animation src="./数的划分无剪枝.js"
                viewbox="-2.500000000000002 -1.5500000000000005 1005 222.55"
                style="width: 1000px; height: 200px;"></sd-animation>
        </div>
        <p class="fragment">但只要我们稍微加一个剪枝......</p>
        <p class="fragment">假设前面构造出的数列之和为 $sum$，当前打算放的数字是 $i$，之后还有 $t$ 个位置需要放数字</p>
        <p class="fragment">$$sum+it\lt n$$</p>
        <sd-animation src="./数的划分有剪枝.js" class="fragment"
            viewbox="0 0 1000 220"
            style="width: 1000px; height: 200px;"></sd-animation>
    </section>
</section>
