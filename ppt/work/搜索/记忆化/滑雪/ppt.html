    <problem data-source="https://www.luogu.com.cn/problem/P1434"></problem>
    <section>
        <h2>滑雪</h2>
        <p>对于每个地点，我们搜索出从它出发的<b>最长滑雪距离</b>，并<b>“记忆”</b>下来</p>
        <div style="display: flex; align-items: center;">
            <iframe data-animation="./滑雪.html" class="fragment"
                style="width: 30%; height: 300px;"></iframe>
            <div style="width: 80%;">
                <codeblock class="fragment">
                    <script type="text/template">
                        // walk(x, y)：求出从 (x, y) 出发的最长滑雪距离，并返回
                        // mxlen[x][y]：记录 (x, y) 出发的最长滑雪距离
                        int walk(int x, int y) {
                            if (mxlen[x][y] != -1) return mxlen[x][y]; // 返回记忆中的最长距离
                            int len = 1;
                            for (int i = 0; i <= 3; i++) {
                                int tx = x + dx[i];
                                int ty = y + dy[i];
                                if (1 <= tx && tx <= R && 1 <= ty && ty <= C && a[x][y] > a[tx][ty]) {
                                    len = max(len, walk(tx, ty) + 1);
                                }
                            }
                            mxlen[x][y] = len;
                            return len;
                        }
                    </script>
                </codeblock>
            </div>
        </div>
    </section>
    <section>
        <h2>滑雪</h2>
        <iframe data-animation="./滑雪无记忆化.html"
            data-maxFrame="1"
            style="width: 1000px; height: 400px;"></iframe>
        <p class="fragment">在没有记忆化的情况下，存在大量重复计算</p>
    </section>
</section>
