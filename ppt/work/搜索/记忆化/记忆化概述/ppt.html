    <section>
        <h2>记忆化</h2>
        <p>以斐波那契数列的求解过程为例</p>
        <iframe data-animation="./斐波那契数列.js"
            style="width: 1000px; height: 300px;"></iframe>
        <p style="margin-top: 0px;">斐波那契数列的递归函数是没有副作用的，输入固定则输出固定...</p>
        <codeblock class="fragment">
            <script type="text/template">
                int f(int x) {
                    if (x <= 2) return 1;
                    if (memory[x]) return memory[x];
                    memory[x] = f(x - 1) + f(x - 2);
                    return memory[x];
                }
            </script>
        </codeblock>
        <p class="fragment">由于每个元素最多只会被计算一次，后续调用会直接返回记忆中的结果，所以时间复杂度为 $O(n)$</p>
