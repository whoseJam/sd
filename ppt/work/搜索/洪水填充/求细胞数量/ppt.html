        <h2>求细胞数量</h2>
        <p>求解屏幕上非零元素构成的连通块的数量</p>
        <sd-animation src="./求细胞数量.js"
            style="width: 1000px; height: 300px;"></sd-animation>
        <codeblock class="fragment">
            <script type="text/template">
                // col[i][j]：第 i 行第 j 列的颜色
                int Ans = 0;
                for (int i = 1; i <= n; i++) {
                    for (int j = 1; j <= m; j++) {
                        if (mp[i][j] != '0' && !col[i][j]) {
                            Dfs(i, j);
                            Ans++;
                        }
                    }
                }
            </script>
