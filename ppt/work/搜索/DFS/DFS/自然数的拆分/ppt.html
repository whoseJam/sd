    <section>
        <h2>自然数的拆分</h2>
        <p>把一个自然数 $n$ 拆分成若干个<b style="color: red;">不下降</b>的自然数，要求拆分出来的自然数的和等于 $n$</p>
        <ul>
            <li class="fragment">$4=1+1+1+1$</li>
            <li class="fragment">$4=1+1+2$</li>
            <li class="fragment">$4=1+3$</li>
            <li class="fragment">$4=2+2$</li>
        </ul>
    </section>
    <section>
        <h2>自然数的拆分</h2>
        <p>第一步，定义问题</p>
        <p class="fragment">类似全排列，可以定义如下函数</p>
        <codeblock class="fragment">
            <script type="text/template">
                // 枚举到序列中的第 d 个数字 
                // 前 d-1 个数字已经确定了
                // 要把后面若干个数字确定下来
                void divide(int d) {
                }
            </script>
        </codeblock>
        <sd-animation src="./问题定义.js" class="fragment"
            style="width: 1000px; height: 200px;"></sd-animation>
    </section>
    <section>
        <h2>自然数的拆分</h2>
        <p>第二步，实现问题</p>
        <sd-animation src="./问题实现.js"
            style="width: 1000px; height: 200px;"></sd-animation>
        <p class="fragment quote">思考本题需要在全局存些什么东西</p>
        <codeblock class="fragment">
            <script type="text/template">
                int sum;
                vector< int > arr;
                void divide(int d) {
                    for (int i = arr.back(); i <= n; i++) {
                        if (sum + i <= n) {
                            sum += i; arr.push_back(i);
                            divide(d + 1);
                            sum -= i; arr.pop_back();
                        }
                    }
                }
            </script>
        </codeblock>
    </section>
    <section>
        <h2>自然数的拆分</h2>
        <p>第三步，处理边界</p>
        <sd-animation src="./问题边界.js"
            style="width: 1000px; height: 200px;"></sd-animation>
        <codeblock class="fragment">
            <script type="text/template">
                int sum;
                vector< int > arr;
                void divide(int d) {
                    if (sum == n) {
                        for (int v : arr) cout << v << ' '; cout << '\n';
                        return;
                    }
                    for (int i = arr.back(); i <= n; i++) {
                        if (sum + i <= n) {
                            sum += i; arr.push_back(i);
                            divide(d + 1);
                            sum -= i; arr.pop_back();
                        }
                    }
                }
            </script>
        </codeblock>
    </section>
