            <script type="text/template">

                // 前 d-1 个元素已经确定了
                // 要把后面的 n-d+1 个元素构成的排列枚举出来
                void permutation(int d) {
                }
            </script>
        </codeblock>

    <section>
        <h2>全排列问题</h2>
        <p>第二步，实现问题</p>
        <iframe data-animation="./问题实现.js"
            style="width: 1000px; height: 200px;"></iframe>
        <codeblock class="fragment">
            <script type="text/template">
                bool used[N];
                vector< int > arr;
                void permutation(int d) {
                    for (int i = 1; i <= n; i++) {
                        // 确保在当前位置上放置的数字，在前面的位置上没有使用过
                        if (!used[i]) {
                            used[i] = true; arr.push_back(i); // 使用一下
                            permutation(d + 1);
                            used[i] = false; arr.pop_back(); // 撤销使用
                        }
                    }
                }
            </script>
        </codeblock>
        <p class="fragment quote">本题与前面所讲的递归题目有一个显著不同，它的递归函数是有<b style="color: purple;"><ruby>副作用<rt>side effect</rt></ruby></b>的</p>
    </section>
    <section>
        <h2>全排列问题</h2>
        <p>第三步，处理边界</p>
        <iframe data-animation="./问题边界.js"
            style="width: 1000px; height: 200px"></iframe>
        <codeblock>
            <script type="text/template">
                bool used[N];
                vector< int > arr;
                void permutation(int d) {
                    if (d == n + 1) {
                        for (int v : arr) cout << v << ' '; cout << '\n';
                        return;
                    }
                    for (int i = 1; i <= n; i++) {
                        // 确保在当前位置上放置的数字，在前面的位置上没有使用过
                        if (!used[i]) {
                            used[i] = true; arr.push_back(i); // 使用一下
                            permutation(d + 1);
                            used[i] = false; arr.pop_back(); // 撤销使用
                        }
                    }
                }
            </script>
        </codeblock>
    </section>
