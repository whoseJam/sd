<section>
    <section>
        <h1>二叉树旋转</h1>
    </section>
    <problem data-problemset="luogu" data-problemid="P3521"></problem>
    <section>
        <h2>二叉树旋转</h2>
        <iframe data-animation="./样例解释.js"
            data-viewBoxDelta="0 0 0 20"
            style="width: 1000px; height: 300px;"></iframe>
        <p>给定一棵二叉树，树上每个节点都有一个权值</p>
        <p class="fragment">你可以任意选择一些节点，交换它们的左右子树</p>
        <p class="fragment">最小化二叉树先序遍历中的逆序对数</p>
    </section>
    <section>
        <h2>二叉树旋转</h2>
        <p>如果交换 $u$ 的左右子树...</p>
        <iframe data-animation="./旋转.js"
            style="width: 1000px; height: 300px;"></iframe>
        <ul>
            <li class="fragment">$lc$ 内部的逆序对数量，不会因此次交换而受到影响</li>
            <li class="fragment">$rc$ 内部的逆序对数量，不会因此次交换而受到影响</li>
            <li class="fragment">横跨 $lc$ 和 $rc$ 的逆序对数量，会受到此次交换的影响</li>
        </ul>
        <p class="fragment">
            $$
            answer=原始逆序对数量+\sum_{u}min(交换u的左右子树产生的逆序对变化,0)
            $$
        </p>
        <p class="fragment quote">怎么快速地，对每个节点求<b>交换前</b>和<b>交换后</b>的逆序对数量呢？</p>
    </section>
    <section>
        <h2>二叉树旋转</h2>
        <iframe data-animation="./线段树合并.js"
            style="width: 1000px; height: 500px;"></iframe>
    </section>
</section>
