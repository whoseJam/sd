    <section>
        <h2>钉子和小球</h2>
        <iframe data-animation="./状态转移.js"
            style="width: 1000px; height: 300px;"></iframe>
        <p>设 $f(i,j)$ 表示小球来到 $(i,j)$ 的概率</p>
        <ul>
            <li class="fragment">如果有针，则小球会往两边走，那么
                <ul>
                    <li>$\frac{f(i,j)}{2}\stackrel{+}{\rightarrow} f(i+1,j)$</li>
                    <li>$\frac{f(i,j)}{2}\stackrel{+}{\rightarrow} f(i+1,j+1)$</li>
                </ul>
            </li>
            <li class="fragment">如果没有针，则小球会往下掉，那么
                <ul>
                    <li>$f(i,j)\stackrel{+}{\rightarrow} f(i+2,j+1)$</li>
                </ul>
            </li>
        </ul>
    </section>
</section>
