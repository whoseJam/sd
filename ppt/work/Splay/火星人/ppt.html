    <section data-background-iframe="http://43.143.204.105/problem/513" data-background-interactive>
    </section>
    <section>
        <h2>火星人</h2>
        <p>让你维护一个字符串 $s$，支持对字符串的单点修改，以及查询字符串以 $x$ 下标为开头的后缀，和以 $y$ 下标为开头的后缀，其最长公共前缀的长度</p>
    </section>
    <section>
        <h2>火星人</h2>
        <p>查询两个字符串的最长公共前缀，最直观的想法就是二分+字符串哈希，二分两个字符串的最长公共前缀的长度，然后将这段字符串的哈希值求出来，比较判断是否相等</p>
        <pre class="fragment"><code data-trim data-line-numbers class="cpp"><script type="text/template">
            int l = 1, r = n, mid;
            while (l <= r) {
                mid = (l + r) >> 1;
                if (getHash(x, x + mid -1) == getHash(y, y + mid - 1)) l = mid + 1;
                else r = mid - 1;
            }
            return r;
        </script></code></pre>
    </section>
    <section>
        <h2>火星人</h2>
        <p>然后我们如果能快速求得 $s$ 这个字符串的任意一个子区间的哈希值，以及能动态修改 $s$ 这个字符串就好了</p>
        <p class="fragment">显然可以用Splay来维护</p>
        <p class="fragment">时间复杂度 $O(nlog^2n)$</p>
    </section>
</section>
