    <section>
        <h1>字符串哈希</h1>
    </section>
    <problem data-problemset="luogu" data-problemid="P3370"></problem>
    <section>
        <h2>字符串哈希</h2>
        <p>我们可以选择把字符串都丢进一个set里面，最后看set的大小，就是不同的字符串数量了</p>
        <codeblock class="fragment">
            <script type="text/template">
                set < string > S;
                for (int i = 1; i <= n; i++) {
                    string tmp;
                    cin >> tmp;
                    S.insert(tmp);
                }
                cout << S.size() << '\n';
            </script>
        </codeblock>
    </section>
    <section>
        <h2>字符串哈希</h2>
        <p>也可以选择把字符串的Hash值都丢进一个set里面，最后看set的大小，就是不同的字符串数量了</p>
        <codeblock class="fragment">
            <script type="text/template">
                set < ull > S;
                for (int i = 1; i <= n; i++) {
                    scanf("%s", s + 1);
                    ull code = Hash(s);
                    S.insert(code);
                }
                cout << S.size() << '\n';
            </script>
        </codeblock>
    </section>
    <section>
        <h2>两种做法时间对比</h2>
        <picture data-source="./字符串哈希.png"></picture>
        <p class="fragment">$O(nlogn|比较两个字符串的时间开销|)$ or $O(nlogn|比较两个ull的时间开销|)$</p>
    </section>
</section>
