        <h2>牛的基因组学</h2>
        <p>二分长度 $k$，然后检验能否找到一个长度 $k$ 的区分<b>斑点</b>和<b>非斑点</b>牛的基因段</p>
        <codeblock class="fragment">
            <script type="text/template">
                bool Check(int len) {
                    for (int l = 1, r; l + len - 1 <= m; l++) {
                        r = l + len - 1;
                        set < ull > S;
                        for (int i = 1; i <= n; i++)
                            S.insert(Hash(i, l, r));
                        bool flg = true;
                        for (int i = n + 1; i <= n * 2; i++)
                            if (S.find(Hash(i, l, r)) != S.end()) {
                                flg = false;
                                break;
                            }
                        if (flg) return true;
                    }
                    return false;
                }
            </script>
