    <section>
        <h1>奶牛回音</h1>
    </section>
    <problem data-problemset="luogu" data-problemid="P2957"></problem>
    <section>
        <h2>奶牛回音</h2>
        <p>两个串 $s$ 和 $t$</p>
        <p class="fragment">取整数 $k$，截取某个串的前 $k$ 个字符和另一个串的后 $k$ 个字符，如果结果相同则 $k$ 是一个合法的整数</p>
        <p class="fragment">求最大的合法整数 $k$</p>
    </section>
    <section>
        <h2>奶牛回音</h2>
        <p>暴力枚举 $k$，再去检验是否合法，时间复杂度 $O(n^2)$（其中 $n=min(|s|,|t|)$）</p>
        <p class="fragment">预处理两个串的Hash值，检验合法性时直接比较Hash值，时间复杂度被优化为 $O(n)$</p>
    </section>
    <section>
        <h2>奶牛回音</h2>
        <codeblock>
            <script type="text/template">
                int lim = min(ls, lt);
                for (int i = lim; i >= 1; i--) {
                    if (GetHash(Ss, ls - i + 1, ls) == GetHash(St, 1, i)) {
                        cout << i << '\n';
                        return 0;
                    }
                    if (GetHash(St, lt - i + 1, lt) == GetHash(Ss, 1, i)) {
                        cout << i << '\n';
                        return 0;
                    }
                }
            </script>
        </codeblock>
    </section>
