<section>
    <section>
        <h1>快速幂概述</h1>
        <p>$a^3$ 简简单单，$a^{300000000000000000}$ 复复杂杂</p>
    </section>
    <section>
        <h2>快速幂</h2>
        <p>快速幂，即快速求幂次</p>
        <p class="fragment">
            $$
            a^b
            $$
        </p>
        <div class="fragment">
            <codeblock>
                <script type="text/template">
                    // 计算 a 的 b 次幂取余 Mod 的值
                    int Pow(int a, int b) {
                        int ans = 1;
                        for (int i = 1; i <= b; i++)
                            ans = ans * a % Mod;
                        return ans;
                    }
                </script>
            </codeblock>
            <p>时间复杂度为 $O(b)$</p>
        </div>
        <p class="fragment">快速幂则是一种以 $O(logb)$ 的时间复杂度计算 $a^b$ 的方法</p>
    </section>
    <section>
        <h2>快速幂</h2>
        <iframe data-animation="./快速幂.js"
            data-viewBox="-100 -20 500 200"
            style="width: 1000px; height: 300px;"></iframe>
        <codeblock class="fragment">
            <script type="text/template">
                // 计算 a 的 b 次幂取余 Mod 的值
                int Fastpow(int a, int b) {
                    int ans = 1;
                    while (b) {
                        if (b & 1) ans = ans * a % Mod;
                        a = a * a % Mod;
                        b >>= 1;
                    }
                    return ans;
                }
            </script>
        </codeblock>
    </section>
</section>
