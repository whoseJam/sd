    <problem data-problemset="luogu" data-problemid="P2485"></problem>
    <section>
        <h2>计算器</h2>
        <p>这是一个三合一题目，给定 $y,z,p$，题目要求我们求解：</p>
        <ul>
            <li>$y^z\ mod\ p$<span class="fragment">，显然快速幂可做</span></li>
            <li>$xy\equiv z(mod\ p)$ 的最小非负整数解 $x$<span class="fragment">，显然Exgcd可做</span></li>
            <li>$y^x\equiv z(mod\ p)$ 的最小非负整数解 $x$<span class="fragment">，显然BSGS可做</span></li>
        </ul>
    </section>
