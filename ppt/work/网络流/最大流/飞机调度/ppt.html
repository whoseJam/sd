    <problem data-source="https://www.luogu.com.cn/problem/P5769"></problem>
    <section>
        <h2>飞机调度</h2>
        <p>把航线看作节点，如果一个航线 $i$ 跑完来得及跑另一条航线 $j$，则 $i\rightarrow j$</p>
        <iframe data-animation="./建图.js" class="fragment"
            style="width: 1000px; height: 280px;"></iframe>
        <p class="fragment">这显然会构成一个有向无环图，该有向无环图的最小覆盖即为答案</p>
        <iframe data-animation="./连边.js" class="fragment"
            style="width: 1000px; height: 90px;"></iframe>
        <p class="fragment">
            $$
            D_i+T_{X_i,Y_i}+P_{Y_i}+f_{Y_i,X_j}\le D_j
            $$
            其中 $T$ 是两个站点的直接距离，$f$ 是两个站点的最短距离
        </p>
    </section>
</section>
