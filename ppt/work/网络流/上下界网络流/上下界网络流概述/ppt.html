    <section>
        <h1>上下界网络流</h1>
        <p>之前提到的网络流可以看作每条边容量下限为 $0$，容量上限各异的模型，由于这种情况下最小流必然为 $0$，所以研究最小流没有意义——但如果每条边的容量下限也各异呢？</p>
    </section>
    <section>
        <h2>上下界网络流</h2>
        <p>上下界网络流概念上很简单，就是给了你一张网络流图，图上每条边除了有容量上限以外，还有容量下限</p>
        <p>在这种情况下，我们就不一定能找到合法的流量情况了，我们会比较关心</p>
        <ol>
            <li class="fragment">是否能找到一个合法的、满足所有边的上下限的流方案——<b>可行流</b></li>
            <li class="fragment">在合法的情况下，从源点到汇点的最大流是多少——<b>有源汇最大流</b></li>
            <li class="fragment">在合法的情况下，从源点到汇点的最小流是多少——<b>有源汇最小流</b></li>
        </ol>
    </section>
</section>
