    <section>
        <h1>有源汇上下界可行流</h1>
    </section>
    <section>
        <h2>有源汇上下界可行流</h2>
        <p>给定有源汇流量网络 $G$，询问是否存在一种标定每条边流量的方式，使得每条边流量满足上下界同时除了源点和汇点每一个点流量平衡</p>
    </section>
    <section>
        <h2>有源汇上下界可行流</h2>
        <p>我们知道可行流在无源汇的情况下，实际上是在找环流</p>
        <p class="fragment">在有源汇的情况下，我们只需要让源点到汇点的流，总能通过汇点流回源点构成环即可</p>
        <p class="fragment">故，我们可以连一条从汇点到源点的上限为 $+\infty$，下限为 $0$ 的连边 $e$，就能把有源汇上下界可行流，转化为无源汇上下界可行流了</p>
        <p class="fragment quote">
            注意，我们在取可行流的答案的时候，答案不是Sap跑出的答案，而是 $e$ 这条边上流过的流量
        </p>
        <codeblocK class="fragment">
            <script type="text/template">
                // Wrong
                int ans = Sap();
                
                // Right
                Sap();
                int ans = l[cnt].flw; // 假设第cnt-1和第cnt条边，代表T->S的这一条容量为inf的边
            </script>
        </codeblocK>
    </section>
</section>
