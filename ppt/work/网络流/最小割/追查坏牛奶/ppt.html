    <section>
        <h2>追查坏牛奶</h2>
        <p>求最小割，当存在多个最小割的时候，求最小边数最小割</p>
        <p class="fragment">将每条边的容量改为 $10000000c+1$ 即可</p>
        <p class="fragment">假设最终求出的最小割为 $f$</p>
        <p class="fragment">实际最小割即为 $f/10000000$</p>
        <p class="fragment">最小割的边数即为 $f\%10000000$</p>
    </section>
</section>
