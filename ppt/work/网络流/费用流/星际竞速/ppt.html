    <section>
        <h2>星际竞速</h2>
        <p>有 $n$ 个行星和 $m$ 条单向星际道路</p>
        <p class="fragment">每一次旅行可以传送一个起点出发，沿着道路随意行走</p>
        <p class="fragment">传送到第 $i$ 个行星需要 $A_i$ 个单位时间</p>
        <p class="fragment">经过道路也需要花费若干单位时间</p>
        <p class="fragment">可以进行任意次旅行，要求旅行的总时间尽量少的情况下，访问每个行星<b>恰好一次</b></p>
    </section>
