    <problem data-source="https://www.luogu.com.cn/problem/B2064"></problem>
    <section>
        <h2>斐波那契数列</h2>
        <p>定义斐波那契数列满足 $f_1=f_2=1$，对于 $n\ge 3$，有
            $$
            f_n=f_{n-1}+f_{n-2}
            $$
        </p>
        <p class="fragment">求出 $f_n$</p>
    </section>
    <section>
        <h2>斐波那契数列</h2>
        <p>第一步，定义问题</p>
        <codeblock class="fragment">
            <script type="text/template">
                int f(int k) { // 这个函数计算出斐波那契数列的第 k 项并返回
                }
            </script>
        </codeblock>
        <p class="fragment">第二步，用函数自己实现函数</p>
        <codeblock class="fragment">
            <script type="text/template">
                int f(int k) {
                    return f(k - 1) + f(k - 2);
                }
            </script>
        </codeblock>
        <p class="fragment">第三步，加上边界</p>
        <codeblock class="fragment">
            <script type="text/template">
                int f(int k) {
                    if (k <= 2) return 1;
                    return f(k - 1) + f(k - 2);
                }
            </script>
        </codeblock>
    </section>
    <section>
        <h2>斐波那契数列</h2>
        <codeblock>
            <script type="text/template">
                int f(int k) {
                    if (k <= 2) return 1;
                    return f(k - 1) + f(k - 2);
                }
            </script>
        </codeblock>
