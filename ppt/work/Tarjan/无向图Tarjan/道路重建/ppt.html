<section>
    <section>
        <h1>道路重建</h1>
    </section>
    <problem data-animation="https://www.luogu.com.cn/problem/P2860"></problem>
    <section>
        <h2>道路重建</h2>
        <sd-animation src="./样例解释.js"
            style="width: 1000px; height: 200px;"></sd-animation>
        <p>给你一张无向图</p>
        <p>你需要给这张图加边，使得原图中不存在割边</p>
        <p class="fragment">求至少需要加多少条边</p>
    </section>
    <section>
        <h2>道路重建</h2>
        <p>先把原图用Tarjan收缩成一棵树</p>
        <sd-animation src="./添加道路.js"
            style="width: 1000px; height: 200px;"></sd-animation>
        <p class="fragment">每添加一条边，就选择树中的两个叶子节点，将它们连接起来</p>
        <p class="fragment quote">多玩几个样例可以发现，每个叶子节点连出去一条额外边即可</p>
        <p class="fragment">于是最少的加边数目就是
            $$\lceil\frac{叶子节点数}{2}\rceil$$
        </p>
    </section>
</section>
