    <section>
        <h2>泥泞的牧场</h2>
        <p>在网格图上铺设木板，网格图上有两种地皮：
            <ul>
                <li>草皮，其上不可铺设木板</li>
                <li>泥地，其上必须铺设（至少一层）木板</li>
            </ul>
        </p>
        <p class="fragment">每一块木板都是 $1\times K$ 的形状（$K$ 可以由你任意决定），可以选择横铺或者竖铺，求<b>至少多少块木板</b>可以铺满所有泥地</p>
    </section>
    <section>
        <h2>泥泞的牧场</h2>
        <p class="quote">本题中的泥地，是否就类似于上一题的小行星呢？</p>
        <p class="fragment">每一块泥地需要被一块<b>横向木板</b>或者一块<b>纵向木板</b>铺设</p>
        <p class="fragment quote">如何保证草地上不能铺设木板呢？</p>
    </section>
