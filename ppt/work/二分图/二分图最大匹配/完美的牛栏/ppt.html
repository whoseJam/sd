    <section>
        <h1>完美的牛栏</h1>
    </section>
    <problem data-src="http://43.143.204.105/problem/92"></problem>
    <section>
        <h2>完美的牛栏</h2>
        <p>奶牛需要到牛栏里产奶</p>
        <p class="fragment">每头奶牛有<b>若干个</b>自己偏爱的牛栏，它只能去这些牛栏里产奶</p>
        <p class="fragment">然而，每个牛栏<b>只能容纳一头</b>奶牛</p>
        <p class="fragment">求最多有多少头奶牛可以分配到牛栏</p>
    </section>
    <section>
        <h2>完美的牛栏</h2>
        <p class="quote">我们能不能把牛栏和奶牛，分别当作二分图中位于两边的点呢？</p>
        <p class="fragment quote">应该如何约束<b>某奶牛</b>只能去<b>某些牛栏</b>？</p>
    </section>
    <section>
        <h2>完美的牛栏</h2>
        <p>容易发现我们把奶牛和牛栏各当作二分图两端的点</p>
        <p class="fragment">如果某个奶牛<b>偏爱</b>某个牛栏，那么在它们之间连一条边</p>
        <p class="fragment">二分图最大匹配即为本题答案</p>
    </section>
</section>
