<section>
    <section>
        <h1>树上数颜色</h1>
    </section>
    <problem data-problemset="luogu" data-problemid="U41492"></problem>
    <section>
        <h2>树上数颜色</h2>
        <p class="quote">如何暴力统计某子树内的颜色数量？</p>
        <iframe data-animation="./暴力统计.js" class="fragment"
            style="width: 1000px; height: 300px;"></iframe>
        <codeblock class="fragment">
            <script type="text/template">
                void AddCol(int c) {
                    if (!colCount[c]) colNum++;
                    colCount[c]++;
                }
            </script>
        </codeblock>
        <codeblock class="fragment">
            <script type="text/template">
                void RemoveCol(int c) {
                    if (colCount[c] == 1) colNum--;
                    colCount[c]--;
                }
            </script>
        </codeblock>
    </section>
    <section>
        <h2>树上数颜色</h2>
        <p>然后改造为树上启发式合并</p>
        <iframe data-animation="./树上启发式合并.js"
            style="width: 1000px; height: 300px;"></iframe>
        <codeblock>
            <script type="text/template">
                void DSU(int u) {
                    for (每个轻儿子 v) {
                        DSU(v);
                        RemoveSubtree(v);
                    }
                    if (son[u]) DSU(son[u], u);
                    for (每个轻儿子 v) AddSubtree(v);
                    Add(u);
                    Ans[u] = 当前颜色种类;
                }
            </script>
        </codeblock>
    </section>
</section>
