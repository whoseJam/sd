<section>
    <section>
        <h1>血亲</h1>
    </section>
    <problem data-problemset="codeforces" data-problemid="208E"></problem>
    <section>
        <h2>血亲</h2>
        <p class="quote">树上启发式合并能解决子树内的统计问题，但是这个题是找一个节点与多少个节点拥有共同的 $k$ 级祖先，应该如何转换呢？</p>
        <p class="fragment">想要找一个节点 $u$ 与多少个节点拥有共同的 $k$ 级祖先，那么可以转化为先找到 $u$ 的 $k$ 级祖先 $g$（使用倍增），再找这个 $g$ 有多少个 $k$ 级后代</p>
    </section>
    <section>
        <h2>血亲</h2>
        <p class="quote">如何暴力统计某子树内的 $k$ 级后代数量呢？</p>
        <iframe data-animation="./暴力统计.js" class="fragment"
            style="width: 1000px; height: 300px;" rate="1.01"></iframe>
        <codeblock class="fragment">
            <script type="text/template">
                void AddNode(int u) {
                    count[dep[u]]++;
                }
            </script>
        </codeblock>
    </section>
    <section>
        <h2>血亲</h2>
        <p>然后改造为树上启发式合并</p>
        <iframe data-animation="./树上启发式合并.js"
            style="width: 1000px; height: 300px;"></iframe>
        <codeblock>
            <script type="text/template">
                void DSU(int u) {
                    for (每个轻儿子 v) {
                        DSU(v);
                        RemoveSubtree(v);
                    }
                    if (son[u]) DSU(son[u], u);
                    for (每个轻儿子 v) AddSubtree(v);
                    Add(u);
                    for (每一个挂在 u 上的询问) 查询 k 级后代的数量;
                }
            </script>
        </codeblock>
    </section>
</section>
