    <section>
        <h2>电话表</h2>
        <p>给定 $n$ 个字符串，判断其中是否存在两个字符串 $s$ 和 $t$，满足 $s$ 是 $t$ 的前缀</p>
        <p class="fragment">如果两个字符串 $s$ 和 $t$，满足 $s$ 是 $t$ 的前缀，那么它们在trie上的关系是什么？</p>
        <iframe data-animation="./前缀关系.js" class="fragment"
            style="width: 1000px; height: 400px;"></iframe>
        <p class="fragment">$s$ 是 $t$ 的祖先</p>
    </section>
    <section>
        <h2>电话表</h2>
        <p>判断一下是否存在两个<b style="color: red;">终止节点</b>有<b style="color: purple;">祖先-后代关系</b>即可</p>
        <p class="fragment quote">怎么判断呢？</p>
        <codeblock class="fragment">
            <script type="text/template">
            void insert(const string& s) { // 给出一种在插入操作中进行判断的方法
                int u = 1;
                for (int i = 0, dir; i < s.length(); i++) {
                    dir = s[i] - '0';
                    if (!ch[u][dir])
                        ch[u][dir] = ++tot;
                    u = ch[u][dir];
                    if (flg[u]) Ans = true;
                }
                if (u != tot) Ans = true;
                // 如果最后一个节点不是新建出来的
                // 那么一定有某个已存在的字符串，以它为前缀
                flg[u] = 1;
            }
            </script>
        </codeblock>
    </section>
