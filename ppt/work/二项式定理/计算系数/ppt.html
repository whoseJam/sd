    <section>
        <h2>计算系数</h2>
        <p>
            $$
            (by+ax)^k=\sum_{i=0}^k C_k^i (by)^i (ax)^{k-i}
            $$
        </p>
        <p>求 $x^ny^m$ 前面的系数</p>
        <p class="fragment">其中 $k\le 1000$，暴力递推出组合数，带入可知系数为 $C_k^m a^n b^m$</p>
        <codeblock class="fragment">
            <script type="text/template">
                cin >> A >> B >> K >> N >> M; Pre();
                cout << (C[K][M] * Fastpow(A, N) * Fastpow(B, M)) % Mod;
            </script>
        </codeblock>
    </section>
