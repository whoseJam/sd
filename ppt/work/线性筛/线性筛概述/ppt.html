    <section>
        <h2>线性筛</h2>
        <p>线性筛的思路很简单，我只需要保证每个合数都能，且只能被自己的最小质因子筛去，那么每个合数就只会被筛掉一次了</p>
        <sd-animation src="./线性筛.js" class="fragment"
            style="width: 1000px; height: 200px;"></sd-animation>
        <codeblock class="fragment" style="margin-top: 0px;">
            <script type="text/template">
                void Sieve(int n) {
                    for (int i = 2; i <= n; i++) {
                        if (!vis[i]) prim[++tot] = i;
                        for (int j = 1; j <= tot && i * prim[j] <= n; j++) {
                            vis[i * prim[j]] = 1;
                            if (i % prim[j] == 0) break;
                        }
                    }
                }
            </script>
        </codeblock>
        <div style="display: flex; justify-content: space-around; align-items: center;">
            <ul>
                <li class="fragment">$i=p^kR$</li>
                <li class="fragment">$i\times p\rightarrow x$</li>
                <li class="fragment">$i\times p'\rightarrow y$？（$p\lt p'$）</li>        
            </ul>
            <p class="fragment">$(\frac{i}{p}p')\times p\rightarrow y$</p>
        </div>
    </section>
</section>
