    <section>
        <h2>筛法其一</h2>
        <p>定义最小质因子函数 $f(x)=x的最小质因子$，让你把 $[1,n]$ 的 $f$ 函数的值求出来</p>
        <p class="fragment">线性筛本身就用到了某个合数的最小质因子去筛掉这个合数，利用这个结论就能在筛质数的过程中顺便把 $f$ 求出来了</p>
        <codeblock class="fragment">
            <script type="text/template">
                void Sieve(int n) {
                    for (int i = 2; i <= n; i++) {
                        if (!vis[i]) f[prim[++tot] = i] = i; // 对于任意质数 p，f[p] = p
                        for (int j = 1; j <= tot && i * prim[j] <= n; j++) {
                            vis[i * prim[j]] = 1;
                            f[i * prim[j]] = prim[j]; // 对于任意合数 x，其 f[x] = 筛掉它的合数
                            if (i % prim[j] == 0) break;
                        }
                    }
                }
            </script>
        </codeblock>
