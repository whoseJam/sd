    <section>
        <h2>数颜色</h2>
        <iframe data-animation="./移动时间.js"
            style="width: 1000px; height: 300px;"></iframe>
        <codeblock>
            <script type="text/template">
                void Solve() {
                    int l = 1, r = 0, t = 0;
                    for (int i = 1; i <= qtot; i++) {
                        while (Q[i].l < l) l--, Add(a[l]);
                        while (l < Q[i].l) Del(a[l]), l++;
                        while (r < Q[i].r) r++, Add(a[r]);
                        while (Q[i].r < r) Del(a[r]), r--;
                        while (t < Q[i].t) Upd(++t, l, r, 1);  // 应用修改
                        while (Q[i].t < t) Upd(t--, l, r, -1); // 撤销修改
                        计算第 i 个询问的答案为 Ans;
                    }
                }
            </script>
        </codeblock>
    </section>
    <section>
        <h2>数颜色</h2>
        <iframe data-animation="./修改.js"
            style="width: 1000px; height: 100px;"></iframe>
        <codeblock style="height: 445px;">
            <script type="text/template">
                struct Modify {
                    int x;   // 修改位置
                    int t;   // 修改时间
                    int pre; // 修改前的颜色
                    int nxt; // 修改后的颜色
                };
                void Upd(int t, int l, int r, int f) {
                    if (f == 1) {
                        M[t].pre = a[M[t].x]; a[M[t].x] = M[t].nxt;
                        if (l <= M[t].x && M[t].x <= r) {
                            Del(M[t].pre); // 删除修改前的颜色
                            Add(M[t].nxt); // 添加修改后的颜色
                        }
                    } else {
                        a[M[t].x] = M[t].pre;
                        if (l <= M[t].x && M[t].x <= r) {
                            Del(M[t].nxt); // 删除修改后的颜色
                            Add(M[t].pre); // 添加修改前的颜色
                        }
                    }
                }
            </script>
        </codeblock>
