    <section>
        <h1>回滚莫队</h1>
    </section>
    <section>
        <h2>回滚莫队</h2>
        <p>有些情况下，我们做莫队所用的数据结构可能是<b>易于添加，不易于删除</b>的</p>
        <ul>
            <li>$[l,r]\rightarrow [l,r+1]$：添加操作</li>
            <li>$[l,r]\rightarrow [l-1,r]$：添加操作</li>
            <li>$[l,r]\rightarrow [l,r-1]$：删除操作</li>
            <li>$[l,r]\rightarrow [l+1,r]$：删除操作</li>
        </ul>
        <p class="fragment">回滚莫队能帮我们把所有操作都变为添加操作</p>
    </section>
    <section>
        <h2>回滚莫队</h2>
        <iframe data-animation="./回滚.js"
            style="width: 1000px; height: 300px;"></iframe>
        <codeblock class="fragment">
            <script type="text/template">
                for (左端点落在 blockId 块内的询问 Q[i]) {
                    if (右端点也落在 blockId 块内) 暴力计算答案
                    else {
                        while (r <= Q[i].r) r++, Add(r);
                        把当前的 ans 临时保存下来，记必要的保存信息为 S
                        for (int i = blockId 块内的最后一个元素; i >= Q[i].l; i--) Add(l);
                        计算 Q[i] 的答案为 ans
                        根据 S 恢复出移动左端点前的数据结构和答案
                    }
                }
            </script>
        </codeblock>
    </section>
</section>
