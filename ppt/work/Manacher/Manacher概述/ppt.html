<section>
    <section>
        <h1>Manacher</h1>
        <p>处理回文问题的一种算法</p>
    </section>
    <section>
        <h2>Manacher</h2>
        <p>Manacher尝试以 $O(n)$ 的时间复杂度找到一个字符串中的所有回文</p>
    </section>
    <section>
        <h2>Manacher</h2>
        <sd-animation src="./Manacher.js"
            style="width: 1000px; height: 200px;"></sd-animation>
        <codeblock>
            <script type="text/template">
                // s = { # a # b # a # }
                // pos * 2 - i 表示 i 关于 pos 的对称点的位置
                // Max 指向 pos 对应回文串右端 +1 的位置
                void Manacher(const string & s) {
                    int Max = 0, pos = 0;
                    for (int i = 1; i < s.length() - 1; i++) {
                        if (Max > i) p[i] = min(p[pos * 2 - i], Max - i);
                        else p[i] = 1;
                        while (s[i + p[i]] == s[i - p[i]]) p[i]++;
                        if (Max < i + p[i]) {
                            Max = i + p[i]; // p[i] - 1 就是原串中回文串的长度
                            pos = i;
                        }
                    }
                }
            </script>
        </codeblock>
    </section>
</section>
