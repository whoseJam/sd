<section>
    <section>
        <h1>树上差分</h1>
    </section>
    <section>
        <h2>树上差分</h2>
        <p>序列上的区间加法 $\rightarrow$ 序列差分</p>
        <p class="fragment">树上的路径加法 $\rightarrow$ 树上差分</p>
    </section>
    <section>
        <h2>树上差分</h2>
        <p>树上的路径加法其实有两种</p>
        <ul>
            <li class="fragment">路径上每个点的点权 $+1$</li>
            <li class="fragment">路径上每条边的边权 $+1$</li>
        </ul>
        <p class="fragment">它们分别对应了<b>点差分</b>和<b>边差分</b></p>
    </section>
    <section>
        <h2>树上差分</h2>
        <p>树上的差分由树的子树和定义</p>
        <ul>
            <li class="fragment">$\{d\}$ 是 $\{s\}$ 的差分</li>
            <li class="fragment">$\{s\}$ 是 $\{d\}$ 的子树和</li>
        </ul>
        <p class="fragment" style="font-size: 20px;">
            $$
            s_u=\sum_{v\in sub(u)}d_v
            $$
        </p>
        <p class="fragment" style="font-size: 20px;">
            $$
            d_u=s_u-\sum_{v\in son(u)}s(v)
            $$
        </p>
        <div style="display: flex;">
            <sd-animation src="./点差分.js" class="fragment"
                style="width: 1000px; height: 300px;"></sd-animation>
            <sd-animation src="./边差分.js" class="fragment"
                style="width: 1000px; height: 300px;"></sd-animation>
        </div>
    </section>
</section>
