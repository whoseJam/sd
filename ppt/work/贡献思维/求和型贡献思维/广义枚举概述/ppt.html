<section>
    <section>
        <h1>枚举顺序和枚举贡献</h1>
        <p>这里我们主要关注求和枚举</p>
    </section>
    <section>
        <h2>枚举顺序</h2>
        <p>
            $$
            \sum_{i=1}^n\sum_{j=1}^m f(i,j)
            $$
        </p>
        <codeblock class="fragment">
            <script type="text/template">
                int ans = 0;
                for (int i = 1; i <= n; i++)
                    for (int j = 1; j <= m; j++)
                        ans += f[i][j];
            </script>
        </codeblock>
        <p class="fragment">
            $$
            \sum_{j=1}^m\sum_{i=1}^n f(i,j)
            $$
        </p>
        <codeblock class="fragment">
            <script type="text/template">
                int ans = 0;
                for (int j = 1; j <= m; j++)
                    for (int i = 1; i <= n; i++)
                        ans += f[i][j];
            </script>
        </codeblock>
    </section>
    <section>
        <h2>枚举贡献</h2>
        <p>
            $$
            \sum_{i=1}^n\sum_{j=1}^mf(i,j)g(i)h(j)
            $$
        </p>
        <p>这里面的 $f,g,h$ 函数都是枚举贡献，它们都会对最后和式的输出产生影响</p>
        <ul>
            <li class="fragment">$f(i,j)$：此贡献与 $i$ 和 $j$ 都有关系，它是最复杂的、我们最应该尽力避免的贡献</li>
            <li class="fragment">$g(i)/h(j)$：此贡献只与 $i$ 或者只与 $j$ 有关</li>
        </ul>
    </section>
</section>
