    <section>
        <h2>BASH博弈</h2>
        <p>一堆石子共 $n$ 个，两人轮流从中取石子，规定每次至少取一个，最多取 $m$ 个，最后取光者得胜。问两人博弈，都采用最聪明的策略，最后谁可以必胜</p>
    </section>
    <section>
        <h2>BASH博弈</h2>
        <sd-animation src="./递推.js"
            style="width: 1000px; height: 300px;"></sd-animation>
        <ul>
            <li class="fragment">若 $n$ 是 $m+1$ 的倍数，则后手必胜</li>
            <li class="fragment">否则，先手必胜</li>
        </ul>
    </section>
