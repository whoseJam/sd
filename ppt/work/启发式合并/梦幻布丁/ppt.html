    <section>
        <h2>梦幻布丁</h2>
        <p>我们可以用可变长数组去维护每一种颜色的布丁出现的所有位置</p>
        <iframe data-animation="./梦幻布丁.js" class="fragment"
            style="width: 1000px; height: 250px;"></iframe>
        <p class="fragment" style="margin-top: -20px;">那么在把一种颜色的布丁更改为另一种颜色的时候，需要判断有多少段颜色被合并为一段颜色，有多少段颜色被销毁了</p>
        <codeblock class="fragment">
            <script type="text/template">
                void Merge(int A, int B) { // color A -> color B
                    vector < int > & posA = pos[A];
                    vector < int > & posB = pos[B];
                    for (auto p: posA) {
                        if (col[p - 1] == B) ans--; // [...B B A...] -> [...B B B...]
                        if (col[p + 1] == B) ans--; // [...A B B...] -> [...B B B...]
                    }
                    for (auto p: posA) col[p] = B;
                    for (auto p: posA) posB.push_back(p);
                    posA.clear();
                }
            </script>
        </codeblock>
    </section>
    <section>
        <h2>梦幻布丁</h2>
        <codeblock>
            <script type="text/template">
                for (int i = 1, opt, x, y; i <= m; i++) {
                    scanf("%d", & opt);
                    if (opt == 2) printf("%d\n", ans);
                    else {
                        scanf("%d%d", & x, & y);
                        if (x == y) continue;
                        if (pos[now[x]].size() > pos[now[y]].size())
                            swap(now[x], now[y]);
                        Merge(now[x], now[y]);
                    }
                }
            </script>
        </codeblock>
        <iframe data-animation="./梦幻布丁映射.js"
            style="width: 1000px; height: 300px;"></iframe>
