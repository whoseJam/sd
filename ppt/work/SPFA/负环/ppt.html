<section>
    <section>
        <h1>负环</h1>
        <p>这一题说明在部分情况下SPFA有它的不可替代性</p>
    </section>
    <problem data-source="https://www.luogu.com.cn/problem/P3385"></problem>
    <section>
        <h2>负环</h2>
        <p>如果图中不存在负环，从起点到任意点的最短路<b>最多经过 $n-1$ 条边</b></p>
        <p class="fragment">如果图中有负环，那么从起点到某些点的最短路<b>可以经过无数条边</b></p>
        <p class="fragment quote">想象一条负环由 $u_1,u_2...u_k$ 组成，那么可以在这 $k$ 个点上一直转圈，无穷无尽</p>
        <p class="fragment">所以我们在SPFA的过程中，对每一个点，记录一下<b>从起点到它的最短路经过的边数</b>，如果超过 $n-1$ 则认为存在负环</p>
    </section>
    <section>
        <h2>负环</h2>
        <codeblock>
            <script type="text/template">
                bool SPFA(int S) {
                    queue < int > q;
                    for (int i = 1; i <= n; i++) dis[i] = inf;
                    dis[S] = 0; inq[S] = 1; q.push(S);
                    while (q.size()) {
                        int u = q.front(); q.pop(); inq[u] = 0;
                        for (auto& link : G[u]) {
                            int v = link.to;
                            int w = link.value;
                            if (dis[v] > dis[u] + w) {
                                dis[v] = dis[u] + w; // 更新 S->v 最短路
                                len[v] = len[u] + 1; // 记录 S->v 最短路经过的边数
                                if (len[v] >= n) return true; // 存在负环
                                if (!inq[v]) { q.push(v); inq[v] = 1; }
                            }
                        }
                    }
                    return false; // 不存在负环
                }
            </script>
        </codeblock>
    </section>
</section>
