<section>
    <section>
        <h1>小苹果</h1>
    </section>
    <problem data-source="https://www.luogu.com.cn/problem/P9748"></problem>
    <section>
        <h2>小苹果</h2>
        <p>每一轮从一排苹果中 $3$ 丢 $1$</p>
        <sd-animation src="./样例解释.js"
            style="width: 1000px; height: 100px;"></sd-animation>
        <p>求</p>
        <ol>
            <li class="fragment">第几轮可以把所有苹果都丢光</li>
            <li class="fragment">第 $i$ 个苹果是在第几轮丢掉的</li>
        </ol>
        <p class="fragment quote">$n\le 10^9$</p>
    </section>
    <section>
        <h2>小苹果</h2>
        <sd-animation src="./样例解释.js"
            style="width: 1000px; height: 100px;"></sd-animation>
        <p>对第一个问题，不妨考虑每一轮丢苹果会丢掉多少个</p>
        <codeblock class="fragment">
            <script type="text/template">
                while (appleCount > 0) {
                    appleCount -= ceil(appleCount / 3);
                }
            </script>
        </codeblock>
    </section>
    <section>
        <h2>小苹果</h2>
        <p>对于第二个问题，我们尝试模拟追踪目标苹果的当前位置</p>
        <sd-animation src="./跟踪位置.js"
            style="width: 1000px; height: 100px;"></sd-animation>
        <codeblock class="fragment">
            <script type="text/template">
                int round = 0;
                while (true) {
                    round++;
                    if ((currentPosition - 1) % 3 == 0) break;
                    currentPosition -= ceil(currentPosition / 3);
                }
            </script>
        </codeblock>
    </section>
</section>
