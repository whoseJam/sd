<section>
    <section>
        <h1>动物园</h1>
    </section>
    <problem data-problemset="luogu" data-problemid="P2375"></problem>
    <section>
        <h2>动物园</h2>
        <p>对一个字符串定义 $num$ 数组，其中 $num(i)$ 表示考虑 $s[1...i]$ 的<b>长度不超过 $\frac i 2$ 的 $border$ 的数量</b></p>
        <p class="fragment">请你求出 $num(1),num(2)...num(n)$</p>
    </section>
    <section>
        <h2>动物园</h2>
        <p>$num(i)$ 表示考虑 $s[1...i]$ 的<b>长度不超过 $\frac i 2$ 的 $border$ 的数量</b></p>
        <sd-animation src="./失配树.js"
            style="width: 1000px; height: 450px;"></sd-animation>
        <p class="fragment">$num(i)$ 的大小，即失配树上第一个<b>长度不大于 $\frac i 2$ 的点</b>的深度</p>
    </section>
    <section>
        <h2>动物园</h2>
        <p>你可以选择一边匹配，一边跳</p>
        <codeblock>
            <script type="text/template">
                for (int i = 1; i <= n; i++) {
                    // 正常 KMP 匹配过程
                    while (cur && A[cur + 1] != A[i]) cur = nxt[cur];
                    if (A[cur + 1] == A[i]) cur++;

                    // 跳到第一个长度不大于 i/2 的点
                    while (cur > (i / 2)) cur = nxt[cur];
                    ans = (ll) ans * (dep[cur] + 1) % Mod;
                }
            </script>
        </codeblock>
        <p class="fragment">也可以选择倍增跳</p>
        <codeblock class="fragment">
            <script type="text/template">
                for (int i = 1; i <= n; i++) {
                    // 倍增跳到第一个长度不大于 i/2 的点
                    int cur = i;
                    for (int j = lim; j >= 0; j--)
                        if (fa[cur][j] > (i / 2)) cur = fa[cur][j];
                    cur = fa[cur][0];
                    ans = (ll) ans * (dep[cur] + 1) % Mod;
                }
            </script>
        </codeblock>
    </section>
</section>
