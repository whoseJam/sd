    <section>
        <h2>熊猫的戏法</h2>
        <p>容易想到，我们可以对每一条线段定义其状态变量 $a_i$，有两种取值：$inc_i$ 和 $ouc_i$，分别表示该线段是在圈里面绕的还是圈外面绕的</p>
        <p class="fragment">如果两条线段 $i$ 和 $j$ 会发生相交......</p>
        <ul>
            <li class="fragment">$inc_i\rightarrow ouc_j$</li>
            <li class="fragment">$inc_j\rightarrow ouc_i$</li>
            <li class="fragment">$ouc_i\rightarrow inc_j$</li>
            <li class="fragment">$out_j\rightarrow inc_i$</li>
        </ul>
    </section>
    <section>
        <h2>熊猫的戏法</h2>
        <p>建图代码如下：</p>
        <pre><code data-trim data-line-numbers class="cpp"><script type="text/template">
            cin >> n >> m;
            for (int i = 1; i <= m; i++) {
                cin >> a[i] >> b[i];
                if (a[i] > b[i]) swap(a[i], b[i]);
            }
            for (int i = 1; i <= m; i++) {
                for (int j = i + 1; j <= m; j++) {
                    if ((a[i] < a[j] && a[j] < b[i] && b[i] < b[j]) ||
                        (a[j] < a[i] && a[i] < b[j] && b[j] < b[i])) {
                        Link(inc(i), ouc(j));
                        Link(inc(j), ouc(i));
                        Link(ouc(i), inc(j));
                        Link(ouc(j), inc(i));
                    }
                }
            }
        </script></code></pre>
    </section>
