<section>
    <section>
        <h1>排队</h1>
    </section>
    <problem data-problemset="luogu" data-problemid="P3223"></problem>
    <section>
        <h2>排队</h2>
        <p>有 $n$ 个男生，$m$ 个女生和两个老师要排成一条直线，要求</p>
        <ul>
            <li class="fragment">任意两个女生不能相邻</li>
            <li class="fragment">两个老师不能相邻</li>
        </ul>
        <p class="fragment">求一共有多少种排法</p>
        <p class="fragment quote">讨论两个老师是被谁隔开的</p>
    </section>
    <section>
        <h2>排队</h2>
        <p>两个老师中间没有男生（由恰好一个女生隔开）</p>
        <sd-animation src="./排队_1.js"
            style="width: 1000px; height: 400px;"></sd-animation>
        <p class="fragment">$$A_n^n(C_m^1A_2^2C_{n+1}^1)A_{n+2}^{m-1}$$</p>
    </section>
    <section>
        <h2>排队</h2>
        <p>两个老师中间存在至少一个男生（可能有 $0$ 个女生、$1$ 个女生或者多个女生）</p>
        <sd-animation src="./排队_2.js"
            style="width: 1000px; height: 400px;"></sd-animation>
        <p class="fragment">$$A_n^nA_{n+1}^2A_{n+3}^m$$</p>
    </section>
</section>
