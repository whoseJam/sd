                <ul>
                    <li class="fragment">考虑上面放 $i$ 个车</li>

                    <li class="fragment">每行具体哪一列待确定，方案数 $A_{c+a-i}^{k-i}$</li>
                </ul>
                <p class="fragment">
                    $$
                    \sum_{i=0}^k C_b^iA_a^iC_d^{k-i}A_{c+a-i}^{k-i}
                    $$
                </p>
