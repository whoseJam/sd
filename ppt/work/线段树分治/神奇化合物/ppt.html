    <section>
        <h2>神奇化合物</h2>
        <p>维护一张图，支持加边，删边，查询连通块数量</p>
        <p class="fragment">在不考虑删边的情况下，容易用并查集实现<span class="fragment">——问题在于并查集不直接支持删除</span></p>
    </section>
    <section>
        <h2>神奇化合物</h2>
        <p>如果能实现一个可回退的并查集，就可以套线段树分治，在每次合并完成后维护连通块的数量，在每个叶子节点上存储答案即可</p>
        <iframe data-animation="./线段树分治.js"
            style="width: 1000px; height: 400px;"></iframe>
    </section>
    <section>
        <h2>神奇化合物</h2>
        <p>可回退并查集，考虑把并查集中的每个操作记录下来实现回退</p>
        <iframe data-animation="./可撤销并查集.js"
            style="width: 1000px; height: 200px;"></iframe>
        <codeblock>
            <script type="text/template">
                vector< vector< pair< int, int> > > history; // 用于记录并查集的操作历史
                void assign(int x, int f) { // let fa[x] = f;
                    history.back().push_back(make_pair(x, fa[x])); // 记录原始值
                    fa[x] = f;
                }
                void next() { // 开启一段新的历史记录
                    history.push({});
                }
                void rollback() { // 撤销最后一段历史记录上的所有修改
                    while (history.back().size() > 0) {
                        pair< int, int > record = history.back().back();
                        fa[record.first] = record.second;
                    }
                    history.pop_back();
                }
            </script>
        </codeblock>
    </section>
</section>
