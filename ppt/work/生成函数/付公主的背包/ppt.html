    <section>
        <h1>付公主的背包</h1>
    </section>
    <problem data-problemset="luogu" data-problemid="P4389"></problem>
    <section>
        <h2>付公主的背包</h2>
        <p>有一个最多装 $10^5$ 个单位体积的背包</p>
        <p class="fragment">有 $n$ 种商品，第 $i$ 种商品的体积为 $V_i$，有 $10^5$ 件</p>
        <p class="fragment">给定 $m$，对于 $s\in [1,m]$，求出用这些商品恰好装 $s$ 个单位体积的方案数</p>
        <p class="fragment">方案数对 $998244353$ 取模</p>
    </section>
    <section>
        <h2>付公主的背包</h2>
        <p>每件物品都很多，相当于完全背包</p>
        <p class="fragment">请写出大小为 $s$ 的物品对应的生成函数</p>
        <p class="fragment">
            $$
            1+x^s+x^{2s}+x^{3s}+...=\frac{1}{1-x^s}
            $$
        </p>
        <p class="fragment">答案就是每件物品生成函数的乘积</p>
        <p class="fragment">对分母做分治NTT，乘完求逆即可</p>
    </section>
</section>
