        <h1>反悔贪心</h1>
    </section>
    <section>
        <h2>反悔贪心</h2>
        <p>贪心本身是没有反悔操作的，贪心求的就是当前最优解，并且局部最优解就是全局最优解</p>
        <p class="fragment">但某些题目中局部最优解不等于全局最优解，此时就需要我们人为分析，应该如何<b>跳出局部最优解</b></p>
    </section>
    <section>
        <h2>反悔贪心</h2>
        <p>按照跳出局部最优解的策略，又分为<b>反悔堆</b>和<b>反悔自动机</b>两种方案</p>
    </section>
</section>
