<section>
    <section>
        <h1>乘积最大</h1>
    </section>
    <problem data-problemset="luogu" data-problemid="P1018"></problem>
    <section>
        <h2>乘积最大</h2>
        <sd-animation src="./样例解释.js"
            style="width: 1000px; height: 300px;"></sd-animation>
        <p>把 $N$ 个数码用 $K$ 个乘号分成恰好 $K+1$ 个部分，使得这 $K+1$ 个部分的乘积最大</p>
        <p class="fragment quote">将数码串进行划分——子序列动态规划模型</p>
        <p class="fragment quote">在划分中使用 $K$ 个乘号——普通资源分配动态规划模型</p>
    </section>
    <section>
        <h2>乘积最大</h2>
        <sd-animation src="./状态转移.js"
            style="width: 1000px; height: 200px;"></sd-animation>
        <p>设 $f_{i,j}$ 表示最后一个数字串的最后一个字符位于 $i$ 上，目前使用了 $j$ 个乘号，能获得的最大结果</p>
        <p class="fragment">
            $$
            f_{i,j}=\mathop{max}\limits_{k}\{f_{k,j-1}\times digit(k+1,i)\}
            $$
            其中 $digit(l,r)$ 表示区间 $[l,r]$ 形成的数字串
        </p>
    </section>
</section>
