    <problem data-problemset="luogu" data-problemid="P1868"></problem>
    <section>
        <h2>饥饿的奶牛</h2>
        <sd-animation src="./样例解释.js"
            style="width: 1000px; height: 300px;"></sd-animation>
        <p>有 $N$ 个区间，从中选出若干个<b>没有交集</b>的区间，你需要让区间覆盖的长度尽可能长</p>
        <p class="fragment quote">乍看之下好像没有什么动态规划模型与之对应，但注意到题目要求选出来的区间没有交集...</p>
        <p class="fragment">可以人为给区间<b style="color: red;">定序</b>，不妨按照区间左端点从小到大排序</p>
        <p class="fragment quote">子序列动态规划模型</p>
    </section>
    <section>
        <h2>饥饿的奶牛</h2>
        <sd-animation src="./定序.js"
            style="width: 1000px; height: 450px;"></sd-animation>
        <p>设 $f_i$ 表示从中选出一个子序列（序列中的每个元素都是一个区间），序列所能覆盖的最长长度</p>
        <p class="fragment">
            $$
            f_{i}=\mathop{max}\limits_{j}\{f_j\}+(R_i-L_i+1),区间i和区间j无交集
            $$
        </p>
    </section>
</section>
