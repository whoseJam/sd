    <section>
        <h2>数列的整除性</h2>
        <p class="quote">序列构造动态规划模型</p>
        <p>设 $f_{i,r}$ 表示构造到序列的第 $i$ 个位置，当前数列对 $k$ 取模的结果为 $r$ 是否可行</p>
        <p class="fragment">
            $$
            \begin{cases}
            f_{i,r}\stackrel{|}{\rightarrow} f_{i+1,(r+a_{i+1})\% k} \\
            f_{i,r}\stackrel{|}{\rightarrow} f_{i+1,(r-a_{i+1})\% k}
            \end{cases}
            $$
        </p>
    </section>
