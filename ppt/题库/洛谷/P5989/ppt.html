        <p>不妨考虑一定要拿走 $a_{i,j}$ 的情况下，至少需要拿走<b>多少个</b>数字<span class="fragment">（设为 $f_{i,j}$ 个数字）</span></p>
        <iframe data-animation="./f数组.js" class="fragment"
            style="width: 1000px; height: 300px;"></iframe>
        <p class="fragment">
            $$
            f_{i,j}=1+f_{i-1,j-1}+f_{i-1,j}-f_{i-2,j-1}
            $$
        </p>
        <p class="fragment">题目所求就是满足 $f_{i,j}\le k$ 的最小的 $a_{i,j}$ 的值</p>
        <p class="fragment">时空复杂度 $O(n^2)$</p>
