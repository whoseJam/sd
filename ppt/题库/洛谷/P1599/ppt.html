        <h2>结算日</h2>
        <sd-animation src="./样例解释.js"
            viewbox-delta="0 0 0 10"
            style="width: 10000px; height: 300px"></sd-animation>
        <p>容易发现在<b style="color: red;">收取/偿还</b>债务的过程中，只有一种情况下，我们需要走回头路<b class="fragment">——路过一头奶牛，目前持有的钱数不足以偿还债务</b></p>
        <p class="fragment">我们要尽可能减少回头路的产生</p>
        <ul>
            <li class="fragment">如果暂时无法偿还第 $i$ 头牛的债务，我们记录此奶牛的位置</li>
            <li class="fragment">如果收取了该奶牛的债务后，能偿还以前的<b>所有债务</b>了，立刻回头</li>
        </ul>
        <p class="fragment quote">立刻回头显然是最优的做法，如果你楞着头往后走，你迟早也得回退到第一头有债务的牛身上去，从当前牛到第一头负债牛的这部分路程是少不了的</p>
