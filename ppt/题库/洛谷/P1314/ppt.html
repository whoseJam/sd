    <section>
        <h2>聪明的质监员</h2>
        <p>总共有 $n$ 个矿石，$m$ 个检查区间，每个检查区间的检验值 $y_i$ 和总的检验值 $y$ 的计算方法如下</p>
        <p>
            $$
            \begin{cases}
            y_i=\sum_{j}[w_j\ge W]\sum_{j}[w_j\ge W]v_j \\
            y=\sum_i y_i
            \end{cases}
            $$
        </p>
        <p>你需要最小化 $|y-s|$，其中 $s$ 是给出的一个标准值</p>
        <sd-animation src="./函数性质.js"
            style="width: 1000px; height: 200px;"></sd-animation>
        <p class="fragment">不难发现，$W$ 越大，$y_i$ 越小，最终算出来的 $y$ 也就越小</p>
        <p class="fragment">而我们要操控这个 $W$ 让 $y$ 去逼近标准值</p>
    </section>
</section>
