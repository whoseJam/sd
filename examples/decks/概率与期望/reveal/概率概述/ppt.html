<section>
    <section>
        <h1>概率</h1>
    </section>
    <section>
        <h2>古典概型</h2>
        <ul>
            <li>随机试验</li>
            <li>单位事件 — 每个发生的可能性相等</li>
            <li>单位事件有限</li>
        </ul>
        <p class="fragment">$P(A) = |A| / |U|$。</p>
    </section>
    <section>
        <h2>条件概率 / 全概率</h2>
        <p>$P(A \mid B) = P(A \cap B) / P(B)$。</p>
        <p>$P(A) = \sum_i P(A \mid B_i) P(B_i)$ — $\{B_i\}$ 为 $U$ 的划分。</p>
    </section>
</section>
