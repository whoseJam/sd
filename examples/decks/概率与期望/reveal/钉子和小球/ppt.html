    <section>
        <h1>钉子和小球</h1>
    </section>
    <section>
        <h2>题意</h2>
        <p>三角形阵的钉子，小球从顶端落下，每次撞钉子等概率落左 / 右。求落到底部某格的概率。</p>
    </section>
    <section>
        <h2>组合数</h2>
        <p>$n$ 层后落到位置 $k$ 的概率 = $C_n^k / 2^n$。</p>
        <p class="fragment">部分钉子缺失时，需要 dp：$f(i, j) = \dots$。</p>
    </section>
</section>
