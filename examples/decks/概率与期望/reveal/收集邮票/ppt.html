<section>
    <section>
        <h1>收集邮票</h1>
    </section>
    <section>
        <h2>题意</h2>
        <p>$n$ 种邮票，第 $k$ 次买的花费 = $k$。每次随机收到一种邮票，求集齐 $n$ 种的期望花费。</p>
    </section>
    <section>
        <h2>双向 dp</h2>
        <p>令 $f(i)$ = 已有 $i$ 种邮票时还需买的次数期望，$g(i)$ = 还需花费的期望。</p>
        <p class="fragment">$f(i) = \frac{i}{n} f(i) + \frac{n - i}{n} (f(i + 1) + 1) + 1$，整理。</p>
    </section>
</section>
