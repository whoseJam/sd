<section>
    <section>
        <h1>普通生成函数 (OGF)</h1>
    </section>
    <section>
        <h2>定义</h2>
        <p>$\text{OGF}(\{a_n\}) = \sum_{n \ge 0} a_n x^n$。</p>
    </section>
    <section>
        <h2>常见</h2>
        <ul>
            <li>$\frac{1}{1 - x} = \sum x^n$（全 1）</li>
            <li>$\frac{1}{(1 - x)^2} = \sum (n + 1) x^n$</li>
            <li>$(1 + x)^n = \sum \binom{n}{k} x^k$</li>
        </ul>
    </section>
    <section>
        <h2>用途</h2>
        <p>组合恒等式证明、计数（多重集选数 / 背包计数）。</p>
    </section>
</section>
