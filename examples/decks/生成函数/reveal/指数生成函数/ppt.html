<section>
    <section>
        <h1>指数生成函数 (EGF)</h1>
    </section>
    <section>
        <h2>定义</h2>
        <p>$\text{EGF}(\{a_n\}) = \sum_{n \ge 0} a_n \frac{x^n}{n!}$。</p>
    </section>
    <section>
        <h2>常见</h2>
        <ul>
            <li>$e^x = \sum \frac{x^n}{n!}$（全 1）</li>
            <li>$\frac{1}{1 - x} = \sum \frac{n! x^n}{n!}$ — 排列计数</li>
        </ul>
    </section>
    <section>
        <h2>用途</h2>
        <p>有序计数（排列、有标号物体的组合）。EGF 的乘法对应有标号的"组合"操作。</p>
    </section>
</section>
