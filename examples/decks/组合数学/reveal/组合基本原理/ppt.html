        <h2>加法原理</h2>
        <p>$A \cap B = \emptyset \Rightarrow |A \cup B| = |A| + |B|$。"做 $A$ 或做 $B$"。</p>
    </section>
    <section>
        <h2>乘法原理</h2>
        <p>$n$ 步独立选择 — 方案数 $= \prod n_i$。"做 $A$ 然后做 $B$"。</p>
