    <section>
        <h1>卡特兰数</h1>
    </section>
    <section>
        <h2>公式</h2>
        <p>$C_n = \frac{1}{n + 1} \binom{2n}{n} = \binom{2n}{n} - \binom{2n}{n - 1}$。</p>
    </section>
    <section>
        <h2>典型场景</h2>
        <ul>
            <li>合法括号序列数</li>
            <li>$n$ 个节点的不同二叉树数</li>
            <li>不穿过对角线的格路</li>
            <li>栈出栈序列数</li>
        </ul>
        <p class="fragment">详见 Catalan 数 deck。</p>
    </section>
</section>
