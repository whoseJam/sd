        <h1>常用恒等式</h1>
    </section>
    <section>
        <h2>清单</h2>
        <ul>
            <li>$C_n^m = C_n^{n - m}$（对称）</li>
            <li>$C_n^m = C_{n-1}^m + C_{n-1}^{m-1}$（递推）</li>
            <li>$\sum_{k=0}^{n} C_n^k = 2^n$（行和）</li>
            <li>$\sum_{k=0}^{n} (-1)^k C_n^k = 0$（$n \ge 1$）</li>
            <li>范德蒙德：$\sum_k C_m^k C_n^{r-k} = C_{m+n}^r$</li>
        </ul>
    </section>
