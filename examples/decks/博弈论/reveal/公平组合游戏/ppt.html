    <section>
        <h1>公平组合游戏 (ICG)</h1>
    </section>
    <section>
        <h2>定义</h2>
        <ul>
            <li>两玩家轮流决策，完整信息</li>
            <li>当前状态决定可行决策（与玩家无关）</li>
            <li>同一状态不可重复抵达，有限步必有非平局结束</li>
        </ul>
        <p class="fragment">每个状态要么<b>必胜</b>要么<b>必败</b>。</p>
    </section>
</section>
