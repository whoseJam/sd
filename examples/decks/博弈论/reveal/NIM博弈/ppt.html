    <section>
        <h2>NIM博弈</h2>
        <p>我们把每一堆石子的数量的异或和记为 $x$</p>
        <ul>
            <li class="fragment">如果 $x=0$，那么这就是一个先手必败态</li>
            <li class="fragment">否则，就是先手必胜态</li>
        </ul>
        <sd-animation src="../../animation/NIM博弈/博弈.js" class="fragment"
            style="margin: 0 auto; width: 720px; height: 280px;"></sd-animation>
    </section>
    <section>
        <h2>NIM博弈</h2>
        <p>对于任意一个局面，如果 $A_1\otimes A_2\otimes...\otimes A_n=x\ne 0$</p>
        <p class="fragment">设 $x$ 的二进制表示下最高位的 $1$ 在第 $k$ 位，那么至少有一堆石子，它的第 $k$ 位是 $1$，假设这堆石子是 $A_i$</p>
        <p class="fragment">我们就从 $A_i$ 堆中取走若干石子，使它的石头数量变为 $A_i\otimes x$ 即可</p>
        <sd-animation src="../../animation/NIM博弈/复杂博弈.js" class="fragment"
            style="margin: 0 auto; width: 800px; height: 320px;"></sd-animation>
    </section>
</section>
