<section>
    <section>
        <h1>SG 函数</h1>
    </section>
    <section>
        <h2>定义</h2>
        <p>状态 $s$ 的后继集合 $S$，$\text{SG}(s) = \text{mex}\{\text{SG}(t) : t \in S\}$（mex = 集合外最小自然数）。</p>
        <p class="fragment">$\text{SG}(s) = 0 \Leftrightarrow s$ 必败。</p>
    </section>
    <section>
        <h2>Sprague-Grundy 定理</h2>
        <p>多个独立 ICG 游戏并行 → $\text{SG}(\text{游戏}) = \bigoplus \text{SG}(\text{子游戏})$。</p>
        <p class="fragment">Nim 是该定理的具体案例。</p>
    </section>
</section>
