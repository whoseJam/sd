<section>
    <section>
        <h1>阶梯博弈</h1>
    </section>
    <section>
        <h2>阶梯博弈</h2>
        <p>给定一个阶梯，每个阶梯上都有若干个石子，双方轮流操作，每次可以将若干个（不能为0）石子向左移动，不能移动（既所有的石子都在地面）的一方为输</p>
        <sd-animation src="../../animation/阶梯博弈/解释.js"
            style="margin: 0 auto; width: 800px; height: 400px;"></sd-animation>
    </section>
    <section>
        <h2>阶梯博弈</h2>
        <p>先考虑只有偶数层有石子的情况</p>
        <p>假设先手拿了若干石子到奇数层，那后手只需要把先手移到奇数层的石子再往下移动到偶数层即可</p>
        <sd-animation src="../../animation/阶梯博弈/偶数层.js"
            style="margin: 0 auto; width: 800px; height: 400px;"></sd-animation>
    </section>
    <section>
        <h2>阶梯博弈</h2>
        <p>对于奇数层的石子而言，将奇数层移动到偶数层，我们可以当作直接把石子拿走（偶数层石子的个数变动不影响之前对于偶数层策略的影响），那么就变为了对于每个奇数层的石子，进行NIM博弈</p>
        <p>我们若可以最后把奇数层的石子都拿完，那么留给对方的局面就是只有偶数层有石子，也就是必输的局面</p>
    </section>
</section>
