        <h2>多米诺骨牌</h2>
        <p>逐行构造网格，并把每个格子分成两类</p>
        <ul>
            <li>已被来自上一行 / 当前行的骨牌覆盖<span class="fragment">，记状态 $1$</span></li>

        </ul>
        <sd-animation src="../../animation/多米诺骨牌/状态转移.js" class="fragment"
            style="margin: 0 auto; width: 1000px; height: 240px;"></sd-animation>
        <p class="fragment">
            $$
            f_{i,S}\rightarrow f_{i+1,T},\ S 与 T 能构成相邻两行
            $$
        </p>
