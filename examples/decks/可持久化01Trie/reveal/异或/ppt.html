<section>
    <section>
        <h1>异或</h1>
    </section>
    <section>
        <h2>题意</h2>
        <p>带点权有根树，支持：</p>
        <ul>
            <li><code>1 x z</code>：$x$ 子树内点权与 $z$ 异或的最大值</li>
            <li><code>2 x y z</code>：$x \to y$ 路径上点权与 $z$ 异或的最大值</li>
        </ul>
    </section>
    <section>
        <h2>做法</h2>
        <p>把"集合 $S$ 与常数 $z$ 异或最大"放到 01Trie 上贪心，关键是怎么得到 $S$：</p>
        <ul>
            <li class="fragment">子树查询 → DFS 序 + 可持久化 01Trie（区间)</li>
            <li class="fragment">路径查询 → 树上前缀和 + 可持久化 01Trie</li>
        </ul>
    </section>
</section>
