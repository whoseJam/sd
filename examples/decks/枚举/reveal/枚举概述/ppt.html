<section>
    <section>
        <h1>枚举</h1>
    </section>
    <section>
        <h2>枚举</h2>
        <sd-animation src="../../animation/枚举概述/数数.js"
            style="margin: 0 auto; width: 720px; height: 140px;"></sd-animation>
        <p class="quote">数一数红球的个数？</p>
        <p class="fragment">在刚才"数"的过程中其实做了两件事：</p>
        <ol>
            <li class="fragment"><b style="color: purple;">遍历</b>每一个球</li>
            <li class="fragment"><b style="color: teal;">检查</b>它是不是红色</li>
        </ol>
        <p class="fragment">把每个球看作<b style="color: red;">样本</b>，所有球构成的集合叫<b style="color: red;">样本空间</b><span class="fragment">；枚举 = 遍历样本空间 + 对每个样本做<b style="color: chocolate;">计算过程</b>。</span></p>
    </section>
    <section>
        <h2>枚举</h2>
        <sd-animation src="../../animation/枚举概述/枚举的结构.js"
            style="margin: 0 auto; width: 760px; height: 360px;"></sd-animation>
        <p class="fragment">简单枚举 = 找出样本空间 + 写清楚计算过程。</p>
        <p class="fragment">复杂枚举要根据计算过程的性质，缩小遍历范围。</p>
    </section>
</section>
