        <h2>举例</h2>
        <codeblock>
            <script type="text/template">
                if (tot >= n) cout << "YES";
                else cout << n - tot;
            </script>
        </codeblock>
        <p>"答案错了"先沿着 $\text{tot}$ 往回查它是怎么算的：</p>
        <codeblock class="fragment">
            <script type="text/template">
                void Toposort() {
                    queue<int> q;
                    for (int i = 1; i <= n; ++i) if (!Ind[i]) q.push(i);
                    while (q.size()) {
                        int u = q.front(); q.pop(); tot++;
                        for (int i : G[u]) {
                            Ind[i]--;
                            if (!Ind[i]) q.push(i);
                        }
                    }
                }
            </script>
        </codeblock>
