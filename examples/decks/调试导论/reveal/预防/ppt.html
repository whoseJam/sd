    <section>
        <h2>拒绝复杂嵌套</h2>
        <codeblock>
            <script type="text/template">
                for (int i = 0; i < G[q[H]].size(); i++) {
                    if (dis[q[H]] + w[q[H]][G[q[H]][i]] < dis[G[q[H]][i]])
                        dis[G[q[H]][i]] = dis[q[H]] + w[q[H]][i];
                }
            </script>
        </codeblock>
        <codeblock class="fragment">
            <script type="text/template">
                int u = q[H];
                for (int i = 0, v; i < G[u].size(); i++) {
                    v = G[u][i];
                    if (dis[u] + w[u][v] < dis[v]) dis[v] = dis[u] + w[u][v];
                }
            </script>
        </codeblock>
    </section>

        <h2>有意义的变量名</h2>
