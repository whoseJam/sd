<section>
    <section>
        <h1>同余</h1>
    </section>
    <section>
        <h2>定义</h2>
        <p>$a \equiv b \pmod m$ — $m | (a - b)$。</p>
    </section>
    <section>
        <h2>性质</h2>
        <ul>
            <li>加 / 减 / 乘可逐项同余</li>
            <li>除法需要逆元（$a / b \equiv a \cdot b^{-1}$）</li>
        </ul>
    </section>
</section>
