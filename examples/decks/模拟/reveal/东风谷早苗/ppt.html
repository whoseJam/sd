    <section>
        <h1>东风谷早苗</h1>
        <p>luogu P1724</p>
    </section>
    <section>
        <h2>朴素 if</h2>
        <codeblock>
            <script type="text/template">
                void walk(int& x, int& y, char code) {
                    if (code == 'E') x++;
                    else if (code == 'S') y--;
                    else if (code == 'W') x--;
                    else if (code == 'N') y++;
                }
            </script>
        </codeblock>
    </section>
    <section>
        <h2>查表</h2>
        <codeblock>
            <script type="text/template">
                map<char, pair<int, int>> dir = {
                    { 'E', { +1,  0 } },
                    { 'S', {  0, -1 } },
                    { 'W', { -1,  0 } },
                    { 'N', {  0, +1 } }
                };
                void walk(int& x, int& y, char code) {
                    x += dir[code].first;
                    y += dir[code].second;
                }
            </script>
        </codeblock>
    </section>
</section>
