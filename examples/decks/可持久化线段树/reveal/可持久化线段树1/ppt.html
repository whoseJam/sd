<section>
    <section>
        <h1>可持久化线段树 1</h1>
        <p>luogu <a href="https://www.luogu.com.cn/problem/P3919" target="_blank" data-preview-link>P3919</a></p>
    </section>
    <section>
        <h2>题意</h2>
        <p>维护一个可持久化数组,支持:</p>
        <ul>
            <li>基于某个历史版本做单点修改</li>
            <li>基于某个历史版本做单点查询</li>
        </ul>
        <p class="fragment">用可持久化线段树模拟可持久化数组。</p>
    </section>
    <section>
        <h2>版本链</h2>
        <sd-animation src="../../animation/可持久化线段树1/可持久化线段树1.js" class="fragment"
            style="margin: 0 auto; width: 960px; height: 400px;"></sd-animation>
        <p style="text-align: center;">
            序列变化:
            <span>$\{3,2,4,1\}$</span>
            <span class="fragment">$\rightarrow \{1,2,4,1\}$</span>
            <span class="fragment">$\rightarrow \{1,3,4,1\}$</span>
            <span class="fragment">$\rightarrow \{1,3,2,1\}$</span>
            <span class="fragment">$\rightarrow \{1,3,2,3\}$</span>
        </p>
    </section>
    <section>
        <h2>insert</h2>
        <codeblock>
            <script type="text/template">
                // x: new node id (output by reference)
                // lastx: reference node in the previous version
                // [l, r]: current segment
                // p: leaf position
                // v: value to write
                void insert(int& x, int lastx, int l, int r, int p, int v) {
                    t[x = ++tot] = t[lastx];                            // share the unchanged subtree
                    if (l == r) { t[x].v = v; return; }
                    int mid = (l + r) >> 1;
                    if (p <= mid) insert(t[x].lc, t[lastx].lc, l, mid, p, v);
                    else          insert(t[x].rc, t[lastx].rc, mid + 1, r, p, v);
                }
            </script>
        </codeblock>
    </section>
</section>
