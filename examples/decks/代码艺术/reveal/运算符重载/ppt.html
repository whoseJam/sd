        <p>C++ 专属</p>

    <section>
        <h2>矩阵乘法 — 函数版</h2>
        <codeblock>
            <script type="text/template">
                struct Matrix { int rows, cols; ... };
                Matrix Mul(const Matrix& a, const Matrix& b) { ... }

                Matrix c = Mul(a, b);
            </script>
        </codeblock>
    </section>
    <section>
        <h2>多个矩阵相乘</h2>
        <codeblock>
            <script type="text/template">
                // 嵌套调用 — 五个矩阵
                Matrix ans = Mul(Mul(Mul(Mul(a, b), c), d), e);
            </script>
        </codeblock>
        <codeblock class="fragment">
            <script type="text/template">
                // 链式累乘 — 可读但啰嗦
                Matrix ans = a;
                ans = Mul(ans, b);
                ans = Mul(ans, c);
                ans = Mul(ans, d);
                ans = Mul(ans, e);
            </script>
        </codeblock>
    </section>
    <section>
        <h2>重载 *</h2>
        <codeblock>
            <script type="text/template">
                Matrix operator*(const Matrix& a, const Matrix& b) {
                    Matrix c = a 和 b 的乘积;
                    return c;
                }

                Matrix ans = a * b * c * d * e * f;
            </script>
        </codeblock>
    </section>
