    <section>
        <h2>嵌套 if</h2>
        <codeblock>
            <script type="text/template">
                void triggerAttack(Character c) {
                    if (c.isReady) {
                        if (c.onGround) {
                            if (!c.isMoving) c.attack();
                            else cout << "character is moving\n";
                        } else cout << "character is not on the ground\n";
                    } else cout << "character is not ready\n";
                }
            </script>
        </codeblock>
        <p>新增条件 / 阅读逻辑 — 都很难。</p>
    </section>
    <section>
        <h2>前置返回</h2>
        <codeblock>
            <script type="text/template">
                void triggerAttack(Character c) {
                    if (!c.isReady) { cout << "character is not ready\n"; return; }
                    if (!c.onGround) { cout << "character is not on the ground\n"; return; }
                    if (c.isMoving)  { cout << "character is moving\n"; return; }
                    c.attack();
                }
            </script>
        </codeblock>
        <p class="fragment">条件平铺、主流程独占最后一行 — 新增条件直接追加。</p>
