<section>
    <section>
        <h1>函数传参</h1>
        <p>引用 / 指针 / 数组 / 常量</p>
    </section>
    <section>
        <h2>三种比较器</h2>
        <codeblock>
            <script type="text/template">
                struct Node { int x, y; };
                bool cmp1(Node a, Node b) { ... }
                bool cmp2(const Node& a, const Node& b) { ... }
                bool cmp3(const Node a, const Node b) { ... }
            </script>
        </codeblock>
        <ul class="fragment">
            <li><code>cmp1</code> 按值传，会拷贝 — 大对象慢</li>
            <li><code>cmp2</code> const 引用 — 不拷贝、不可改，标准做法</li>
            <li><code>cmp3</code> const 值 — 仍然拷贝，const 只作用在函数内</li>
        </ul>
    </section>
</section>
