<section>
    <section>
        <h1>对偶</h1>
        <p>独立集 $\leftrightarrow$ 点覆盖</p>
    </section>
    <section>
        <h2>最大独立集</h2>
        <p>选最多的点，使<b>任意一条边的两端不同时被选</b>。</p>
    </section>
    <section>
        <h2>对偶恒等式</h2>
        <p>对任意图：
            $$\text{最大独立集} = n - \text{最小点覆盖}$$
        </p>
        <p class="fragment">$S$ 是独立集 $\Leftrightarrow$ $V \setminus S$ 是点覆盖（每条边至少一端不在 $S$）。一一对应，互为补。</p>
    </section>
    <section>
        <h2>二分图情形</h2>
        <p>套 König 定理：
            $$\text{最大独立集} = n - \text{最大匹配}$$
        </p>
        <sd-animation src="../../animation/对偶/对偶.js" class="fragment"
            style="margin: 0 auto; width: 460px; height: 320px;"></sd-animation>
        <p class="fragment">跑匈牙利即可。</p>
    </section>
</section>
