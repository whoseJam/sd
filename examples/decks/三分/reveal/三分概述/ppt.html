<section>
    <section>
        <h1>三分</h1>
        <p>比二分多一分</p>
    </section>
    <section>
        <h2>凸函数极值</h2>
        <p>导数不好求时，对单峰函数三分。</p>
        <sd-animation src="../../animation/三分概述/极值.js" class="fragment"
            style="margin: 0 auto; width: 540px; height: 240px;"></sd-animation>
        <codeblock class="fragment">
            <script type="text/template">
                while (fabs(r - l) > eps) {
                    double ml = l + (r - l) / 3.0;
                    double mr = r - (r - l) / 3.0;
                    if (F(mr) > F(ml)) l = ml;
                    else r = mr;
                }
            </script>
        </codeblock>
    </section>
</section>
