    <section>
        <h2>题意</h2>
        <p>$AB$ 上速度 $P$，$CD$ 上速度 $Q$，平面上速度 $R$。求 $A \to D$ 最短时间。</p>

            style="margin: 0 auto; width: 480px; height: 240px;"></sd-animation>
        <p class="fragment">最优解 $|AE| + |EF| + |FD|$，$E \in AB$ 取 $e$ 比例位置，$F \in CD$ 取 $f$ 比例位置。</p>
    </section>
    <section>
        <h2>二元函数</h2>
        <p>$T(e, f)$ 固定一元时关于另一元单峰。</p>
        <sd-animation src="../../animation/传送带/二元函数.js" class="fragment"

    </section>
    <section>
        <h2>嵌套三分</h2>
        <p>外层对 $e$ 三分，内层对每个 $e$ 固定再三分 $f$。</p>
