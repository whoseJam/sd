<section>
    <section>
        <h1>斐波那契数列</h1>
        <p>luogu B2064</p>
    </section>
    <section>
        <h2>三步走</h2>
        <p>定义：</p>
        <codeblock>
            <script type="text/template">
                int f(int k); // 返回 fib(k)
            </script>
        </codeblock>
        <p class="fragment">递归体（黑箱用自己）：</p>
        <codeblock class="fragment">
            <script type="text/template">
                int f(int k) { return f(k - 1) + f(k - 2); }
            </script>
        </codeblock>
        <p class="fragment">加边界：</p>
        <codeblock class="fragment">
            <script type="text/template">
                int f(int k) {
                    if (k <= 2) return 1;
                    return f(k - 1) + f(k - 2);
                }
            </script>
        </codeblock>
    </section>
    <section>
        <h2>递归树</h2>

            style="margin: 0 auto; width: 400px; height: 380px;"></sd-animation>
        <p class="fragment">直接递归是指数级 — 可以加记忆化。</p>
    </section>
