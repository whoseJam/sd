<section>
    <section>
        <h1>递归</h1>
    </section>
    <section>
        <h2>动机</h2>
        <p>枚举样本集合 — 通常一层 for 一层数据。</p>
        <div class="quote">
            <h3>水仙花数</h3>
            <codeblock>
                <script type="text/template">
                    for (int i = 100; i <= 999; i++) 检查 i 是否为水仙花数;
                </script>
            </codeblock>
        </div>
        <div class="quote fragment">
            <h3>百钱买百鸡</h3>
            <codeblock>
                <script type="text/template">
                    for (int a = 1; a <= 100; a++)
                        for (int b = 1; b <= 100; b++)
                            for (int c = 1; c <= 100; c++)
                                检查 (a, b, c) 是否合法;
                </script>
            </codeblock>
        </div>
    </section>
    <section>
        <h2>动态层数</h2>
        <p>如果想枚举 $n$ 维样本，但 $n$ 在运行时才知道呢？</p>
        <codeblock class="fragment">
            <script type="text/template">
                if (n == 1) { for (int i = 1; i <= n; i++) ...
                } else if (n == 2) { for (int i = ...) for (int j = ...) ...
                } else if (n == 3) { ...
                }
            </script>
        </codeblock>
        <p class="fragment quote">需要"循环循环的层数" — 递归就是答案。</p>
    </section>
    <section>
        <h2>递归</h2>
        <codeblock>
            <script type="text/template">
                void loop(int k) {
                    if (k == 1) { for (int i = 1; i <= n; i++) ... }
                    else { for (int i = 1; i <= n; i++) loop(k - 1); }
                }
            </script>
        </codeblock>
        <sd-animation src="../../animation/递归概述/loop.js" class="fragment"
            style="margin: 0 auto; width: 300px; height: 280px;"></sd-animation>
    </section>
    <section>
        <h2>写递归的三步</h2>
        <ol>
            <li>清晰<b>定义问题</b>，写出函数签名 + 注释说明它干啥</li>
            <li class="fragment">用<b>函数自己</b>（黑箱）实现递归体</li>
            <li class="fragment">写<b>边界条件</b></li>
        </ol>
        <sd-animation src="../../animation/递归概述/loop实现.js" class="fragment"
            style="margin: 0 auto; width: 460px; height: 100px;"></sd-animation>
    </section>
</section>
