    <section>
        <h1>二叉树旋转</h1>
    </section>
    <section>
        <h2>题意</h2>
        <p>给一棵带标号二叉树，可在每个节点决定是否交换左右子树。最小化整树 DFS 序列的逆序对数。</p>
    </section>
    <section>
        <h2>子树合并</h2>
        <p>每节点独立决策（交换 / 不交换）；合并子树时用线段树合并计算"左×右"和"右×左"的逆序对，取较小。</p>
    </section>
</section>
