        <h2>题意</h2>
        <p>用范德蒙德恒等式
            $$\sum_{i=0}^{k} C_n^i C_m^{k-i} = C_{n+m}^{k}$$
        </p>
        <p class="fragment">题目 $n, m, k \le 10^{15}$，模数 $1000003$ 是质数 — Lucas 算 $C_{n+m}^{k}$。</p>
