    <section>
        <h1>反悔贪心</h1>
    </section>
    <section>
        <h2>动机</h2>
        <p>贪心本身没有反悔操作 — 总是取当前最优，依赖"局部最优即全局最优"。</p>
        <p class="fragment">局部不等于全局时，需要人为分析<b>怎么跳出局部最优解</b>。</p>
    </section>
    <section>
        <h2>两种策略</h2>
        <ul>
            <li>反悔堆 — 用堆维护"已选的最差决策"</li>
            <li>反悔自动机 — 通过状态机表达"已选 + 反悔"的等价决策</li>
        </ul>
    </section>
</section>
