    <section>
        <h2>题意</h2>
        <p>每个建筑有抢修耗时和截止时间，最大化抢修数量。</p>
    </section>
    <section>
        <h2>反悔堆</h2>
        <p>按截止时间从小到大排序，依次枚举：</p>
        <ul>
            <li class="fragment">当前工作有时间做 — 直接做，进堆（按"工作时长"为 key）</li>
            <li class="fragment">没时间做 — 如果堆顶（已选中工时最长的）$>$ 当前，<b>反悔</b>：弹堆顶，换成当前（节省的时间可能让后面也能塞下）</li>
            <li class="fragment">否则放弃</li>
        </ul>
    </section>
</section>
