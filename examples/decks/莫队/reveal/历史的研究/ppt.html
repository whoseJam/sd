<section>
    <section>
        <h1>历史的研究</h1>
        <p>JOISC 2014 C</p>
    </section>
    <section>
        <h2>题意</h2>
        <p>事件序列 $X_i$，定义重要度 $W_A = A \cdot T_A$（$T_A$ 是 $A$ 在 $[L, R]$ 出现次数）。多次查询区间内最大 $W$。</p>
    </section>
    <section>
        <h2>分析</h2>
        <p>添加好维护 — 直接 $\max$ 更新：</p>
        <codeblock>
            <script type="text/template">
                void Add(int i) {
                    T[X[i]]++;
                    ans = max(ans, X[i] * T[X[i]]);
                }
            </script>
        </codeblock>
        <p class="fragment">删除时如果最大值变了，难以 $O(1)$ 求次大 — 用<b>回滚莫队</b>。</p>
    </section>
</section>
