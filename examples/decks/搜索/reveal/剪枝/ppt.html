        <h1>剪枝</h1>
    </section>
    <section>
        <h2>常用技巧</h2>
        <ul>
            <li><b>可行性剪枝</b>：当前状态不可能达成 — 直接退出</li>
            <li><b>最优性剪枝</b>：当前状态后续最好结果 $\le$ 已知最优 — 退出</li>
            <li><b>对称性剪枝</b>：等价方案只保留一个代表</li>
        </ul>
    </section>
