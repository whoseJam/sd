<section>
    <section>
        <h1>割点 / 桥</h1>
    </section>
    <section>
        <h2>判定</h2>
        <ul>
            <li><b>桥</b>：树边 $(u, v)$（$v$ 是 $u$ 树边孩子）且 $\text{low}(v) > \text{dfn}(u)$</li>
            <li><b>割点</b>：根节点孩子数 $\ge 2$，或非根节点存在树边孩子 $v$ 使 $\text{low}(v) \ge \text{dfn}(u)$</li>
        </ul>
    </section>
</section>
