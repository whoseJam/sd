        <h1>无向图的连通性</h1>
    </section>
    <section>
        <h2>术语</h2>
        <ul>
            <li><b>割点</b>：去掉后图不再连通的点</li>
            <li><b>割边（桥）</b>：去掉后图不再连通的边</li>
            <li><b>点双连通分量</b>：极大不含割点的子图</li>
            <li><b>边双连通分量</b>：极大不含割边的子图</li>
        </ul>
    </section>
