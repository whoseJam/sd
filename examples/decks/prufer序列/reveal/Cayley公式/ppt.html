    <section>
        <h2>Cayley 公式</h2>
        <p>$n$ 个点的完全图有多少棵不同的生成树？</p>
        <p class="fragment">
            $$n^{n - 2}$$
        </p>
        <p class="fragment">每棵生成树对应一个长度 $n - 2$、值域 $[1, n]$ 的 prufer 序列 — 序列总数即生成树总数。</p>
