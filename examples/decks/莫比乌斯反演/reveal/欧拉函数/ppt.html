    <section>
        <h1>欧拉函数</h1>
    </section>
    <section>
        <h2>定义</h2>
        <p>$\varphi(n)$ = $[1, n]$ 中与 $n$ 互质的数个数。</p>
    </section>
    <section>
        <h2>公式</h2>
        <p>$n = \prod p_i^{a_i}$ 时：
            $$\varphi(n) = n \prod (1 - \tfrac{1}{p_i})$$
        </p>
        <p class="fragment">线性筛同时筛 $\varphi$ — 见线性筛 deck。</p>
    </section>
</section>
