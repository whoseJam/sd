<section>
    <section>
        <h1>二分图最大匹配</h1>
    </section>
    <section>
        <h2>二分图</h2>
        <p>能用两种颜色染色、相邻节点不同色 — 等价于<b>无奇环</b>。</p>
    </section>
    <section>
        <h2>匹配 / 最大匹配</h2>
        <p>选一组边使任意点最多在一条边上 — <b>匹配</b>。匹配边数最多者 — <b>最大匹配</b>。</p>
    </section>
    <section>
        <h2>匈牙利算法</h2>
        <p>不断找<b>增广路</b>：匹配边和非匹配边交替的路径，开始和结尾都是非匹配边。反转沿途匹配关系 — 匹配数 +1。</p>
        <codeblock class="fragment">
            <script type="text/template">
                bool findPath(int u) {
                    for (int v : G[u]) {
                        if (!vis[v]) {
                            vis[v] = 1;
                            if (!match[v] || findPath(match[v])) {
                                match[v] = u;
                                return true;
                            }
                        }
                    }
                    return false;
                }
                for (int u in 左侧) { memset(vis, 0, ...); if (findPath(u)) ans++; }
            </script>
        </codeblock>
        <p class="fragment">$O(n(n + m))$。</p>
        <sd-animation src="../../animation/二分图最大匹配/增广路.js" class="fragment"
            style="margin: 0 auto; width: 360px; height: 240px;"></sd-animation>
    </section>
</section>
