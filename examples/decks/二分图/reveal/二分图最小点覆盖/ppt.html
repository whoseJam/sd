<section>
    <section>
        <h1>二分图最小点覆盖</h1>
    </section>
    <section>
        <h2>题意</h2>
        <p>选最少的点，使每条边至少一个端点被选 — 最小点覆盖。</p>
    </section>
    <section>
        <h2>König 定理</h2>
        <p>
            $$\text{二分图最小点覆盖} = \text{二分图最大匹配}$$
        </p>
        <p class="fragment">所以跑匈牙利就能算出最小点覆盖。</p>
    </section>
</section>
