    <section>
        <h1>二分图最大独立集</h1>
    </section>
    <section>
        <h2>题意</h2>
        <p>选最多的点，使任意一条边的两端不同时被选。</p>
    </section>
    <section>
        <h2>对偶</h2>
        <p>
            $$\text{最大独立集} = n - \text{最小点覆盖} = n - \text{最大匹配}$$
        </p>
    </section>
</section>
