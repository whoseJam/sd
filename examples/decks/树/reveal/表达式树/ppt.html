    <section>
        <h1>表达式树</h1>
    </section>
    <section>
        <h2>动机</h2>
        <p>把表达式 "$1 + 2 \times 3$" 表示为树：运算符当内部节点，操作数当叶节点。</p>
    </section>
    <section>
        <h2>遍历对应</h2>
        <ul>
            <li>前序遍历 — 前缀（波兰）表达式</li>
            <li>中序遍历 — 普通中缀（需要括号还原优先级）</li>
            <li>后序遍历 — 逆波兰表达式（栈式求值）</li>
        </ul>
    </section>
</section>
