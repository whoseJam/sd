<section>
    <section>
        <h1>树</h1>
    </section>
    <section>
        <h2>基本术语</h2>
        <ul>
            <li>节点 / 边构成树</li>
            <li class="fragment">根 root：整树的生长起点（每树唯一）</li>
            <li class="fragment">父节点 / 子节点 / 叶节点</li>
            <li class="fragment">度 = 子节点数</li>
            <li class="fragment">深度 / 高度 = 树的层数</li>
        </ul>
    </section>
    <section>
        <h2>性质</h2>
        <ul>
            <li>$n$ 个节点的树恰好 $n - 1$ 条边（除根外每节点连一条父边）</li>
            <li class="fragment">所有节点度数之和也是 $n - 1$</li>
        </ul>
    </section>
    <section>
        <h2>森林</h2>
        <p>若干互不相交的树构成的集合。</p>
        <p class="fragment">$n$ 个节点、$k$ 条边 → $n - k$ 棵树。</p>
    </section>
</section>
