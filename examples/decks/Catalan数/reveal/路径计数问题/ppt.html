<section>
    <section>
        <h1>路径计数问题</h1>
    </section>
    <section>
        <h2>题意</h2>
        <p>左下到右上，不能穿过对角红线（可接触）的方案数。</p>
        <sd-animation src="../../animation/路径计数问题/网格图.js" class="fragment"
            style="margin: 0 auto; width: 400px; height: 320px;"></sd-animation>
        <p class="fragment">向右 / 向上 即两种操作 — $n$ 比较大时不能 $O(n^2)$ 递推。</p>
    </section>
    <section>
        <h2>反射法</h2>
        <p>合法方案数 $=$ 总方案数 $-$ 穿越红线的方案数。</p>
        <ul>
            <li class="fragment">总方案数 $= C_{2n}^{n}$</li>
            <li class="fragment">穿越方案数：把"首次穿越点"开始的后段沿 $y = x + 1$ 反射 — 与"从 $(-1, 1)$ 到 $(n, n)$ 的所有路径"双射，数量 $C_{2n}^{n-1}$</li>
        </ul>
        <sd-animation src="../../animation/路径计数问题/穿过红线的方案.js" class="fragment"
            style="margin: 0 auto; width: 400px; height: 320px;"></sd-animation>
        <p class="fragment">
            $$H_n = C_{2n}^{n} - C_{2n}^{n - 1}$$
        </p>
    </section>
</section>
