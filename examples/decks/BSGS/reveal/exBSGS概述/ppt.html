    <section>
        <h2>exBSGS</h2>
        <p>$\gcd(a, p) \ne 1$ 时，欧拉定理不能直接用。exBSGS 把 $\gcd$ 一层层"剥"出来：每次把方程左右同除 $\gcd$，直到可以归约到 BSGS。</p>
        <p class="fragment">实现复杂，使用频率低 — 详见 <a href="https://www.cnblogs.com/CaCO3/p/16057939.html" target="_blank">这篇博客</a>。</p>
