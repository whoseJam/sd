<section>
    <section>
        <h1>$n$ 次剩余</h1>
    </section>
    <section>
        <h2>问题</h2>
        <p>给定 $a, b, p$，求所有 $n$ 满足
            $$a^n \equiv b \pmod{p}$$
        </p>
    </section>
    <section>
        <h2>两种情况</h2>
        <ul>
            <li>$\gcd(a, p) = 1$ — 用 BSGS</li>
            <li>$\gcd(a, p) \ne 1$ — 用 exBSGS</li>
        </ul>
    </section>
</section>
