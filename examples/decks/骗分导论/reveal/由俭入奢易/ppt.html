<section>
    <section>
        <h1>由俭入奢易</h1>
    </section>
    <section>
        <h2>俭 vs 奢</h2>
        <ul>
            <li>俭 — 朴素 / 暴力</li>
            <li>奢 — 高级算法</li>
        </ul>
        <p class="fragment">先写暴力再写正解通常更容易：</p>
        <ol class="fragment">
            <li>暴力能<b>启发</b>正解 — 端详暴力发现可以优化的点</li>
            <li>暴力是正解的<b>对拍器</b> — 造小数据验证</li>
        </ol>
    </section>
    <section>
        <h2>模拟为俭</h2>
        <p>这里的模拟不是大模拟，而是直接朴素的暴力：</p>
        <codeblock>
            <script type="text/template">
                for (int i = 1; i <= q; i++) {
                    scanf("%d%d", &a, &b);
                    int mn = INT_MAX, mx = INT_MIN;
                    for (int j = a; j <= b; j++) {
                        if (h[j] < mn) mn = h[j];
                        if (h[j] > mx) mx = h[j];
                    }
                    printf("%d\n", mx - mn);
                }
            </script>
        </codeblock>
        <p class="fragment quote">如果你的模拟超过 60 行 — 停一下，可能写歪了。</p>
    </section>
    <section>
        <h2>搜索为俭</h2>
        <p>DFS 最关键的就是参数设计：</p>
        <codeblock>
            <script type="text/template">
                // 当前位于 (x, y)
                void Dfs(int x, int y) { ... }
            </script>
        </codeblock>
        <codeblock class="fragment">
            <script type="text/template">
                // 两个人的位置
                void Dfs(int x1, int y1, int x2, int y2) { ... }
            </script>
        </codeblock>
        <codeblock class="fragment">
            <script type="text/template">
                // 正在考虑第 k 个物品要不要选
                void Dfs(int k) { ... }
            </script>
        </codeblock>
    </section>
</section>
