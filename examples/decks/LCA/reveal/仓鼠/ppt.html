<section>
    <section>
        <h1>仓鼠</h1>
        <p>luogu P3398</p>
    </section>
    <section>
        <h2>题意</h2>
        <p>查询两条树上路径 $a \to b$ 和 $c \to d$ 是否相交。</p>
        <sd-animation src="../../animation/仓鼠/仓鼠.js" class="fragment"
            style="margin: 0 auto; width: 540px; height: 300px;"></sd-animation>
    </section>
    <section>
        <h2>判定</h2>
        <p>设 $x = \text{LCA}(a, b)$，$y = \text{LCA}(c, d)$。两条路径相交 $\Leftrightarrow$</p>
        <ul>
            <li class="fragment">$x$ 在 $c \to d$ 上，或者</li>
            <li class="fragment">$y$ 在 $a \to b$ 上。</li>
        </ul>
        <p class="fragment">"点 $p$ 在 $u \to v$ 上" 等价于 $d(p, u) + d(p, v) = d(u, v)$。</p>
    </section>
</section>
