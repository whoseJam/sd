    <section>
        <h1>二项式定理</h1>
    </section>
    <section>
        <h2>展开</h2>
        <p>
            $$
            \begin{aligned}
            (a + b)^0 &= 1 \\
            (a + b)^1 &= a + b \\
            (a + b)^2 &= a^2 + 2ab + b^2 \\
            (a + b)^3 &= a^3 + 3 a^2 b + 3 a b^2 + b^3 \\
            (a + b)^4 &= a^4 + 4 a^3 b + 6 a^2 b^2 + 4 a b^3 + b^4
            \end{aligned}
            $$
        </p>
        <p class="fragment">
            $$
            (a + b)^n = \sum_{i = 0}^{n} C_n^i a^i b^{n - i}
            $$
        </p>
    </section>
</section>
