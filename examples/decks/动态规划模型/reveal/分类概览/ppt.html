<section>
    <section>
        <h1>动态规划模型分类</h1>
    </section>
    <section>
        <h2>常见模型</h2>
        <ol>
            <li><b>普通资源分配</b>：把资源分配给 $n$ 件事的最优值</li>
            <li><b>有标号资源分配</b>：状态压缩 dp</li>
            <li><b>坐标 dp</b>：网格上路径计数 / 最优值</li>
            <li><b>序列构造 dp</b>：长度递推</li>
            <li><b>区间 dp（树）</b>：合并相邻区间</li>
            <li><b>区间移动 dp</b>：起止两端</li>
            <li><b>棋盘构造 dp</b>：状压 / 轮廓线</li>
            <li><b>子序列 dp</b>：LIS / LCS 类</li>
        </ol>
    </section>
</section>
