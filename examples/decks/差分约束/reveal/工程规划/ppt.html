<section>
    <section>
        <h1>工程规划</h1>
        <p>关键路径与 SPFA</p>
    </section>
    <section>
        <h2>题意</h2>
        <p>$n$ 个任务，每个任务一个开始时刻 $T_i$。给定先后约束 $T_j \ge T_i + d$（任务 $j$ 至少在 $i$ 启动后 $d$ 单位再启动）。求一组合法时刻表。</p>
    </section>
    <section>
        <h2>建模 & 求解</h2>
        <p>每个约束 $T_j \ge T_i + d$ 对应边 $i \to j$ 权 $d$，跑<b>最长路</b>得到每个任务的最早启动时刻。</p>
        <sd-animation src="../../animation/工程规划/SPFA运行.js" class="fragment"
            style="margin: 0 auto; width: 480px; height: 260px;"></sd-animation>
        <p class="fragment">$\text{dis}_i$ 即为关键路径意义下的最早启动时刻。</p>
    </section>
    <section>
        <h2>对齐起点</h2>
        <p>SPFA 得到的 $\text{dis}_i$ 不一定从 $0$ 开始。题目通常要求"最早任务从 $0$ 开始"，整体减去最小值即可：</p>
        <codeblock>
            <script type="text/template">
                int offset = INT_MAX;
                for (int i = 1; i <= n; i++) offset = min(offset, dis[i]);
                for (int i = 1; i <= n; i++) dis[i] -= offset;
            </script>
        </codeblock>
    </section>
</section>
