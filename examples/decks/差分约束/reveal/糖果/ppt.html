        <p>差分约束模板</p>

    <section>
        <h2>题意</h2>
        <p>每个孩子获得至少 1 颗糖；额外约束 $(a, b, k)$：</p>
        <ul>
            <li>$k = 1$：$x_a = x_b$</li>
            <li>$k = 2$：$x_a < x_b$</li>
            <li>...</li>
        </ul>
        <p class="fragment">把各种约束翻译成 $x_i \le x_j + c$ 形式，建图跑最短路。</p>
    </section>
