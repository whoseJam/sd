    <section>
        <h1>夜空星辰</h1>
        <p>POJ 2352</p>
    </section>
    <section>
        <h2>题意</h2>
        <p>统计每颗星星左下方的星星数（能级），保证坐标互不重叠。求每种能级的星星数。</p>
    </section>
    <section>
        <h2>做法</h2>
        <p>按 $y$ 升序处理；同 $y$ 内按 $x$ 升序。处理点 $i$ 时用树状数组查 $[1, x_i]$ 的累计计数 — 那就是 $i$ 的能级。</p>
    </section>
</section>
