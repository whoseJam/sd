    <section>
        <h2>求法</h2>
        <p>反复在残量网络上找增广路 — Dinic 算法（先 BFS 分层，再 DFS 增广）。</p>
        <p class="fragment">复杂度 $O(n^2 m)$，二分图匹配特例 $O(m \sqrt{n})$。</p>
        <codeblock class="fragment">
            <script type="text/template">
                bool bfs() { /* 算 dep[] */ }
                int dfs(int u, int flow) {
                    if (u == t) return flow;
                    int used = 0;
                    for (int& e = cur[u]; e; e = nxt[e]) {
                        int v = to[e];
                        if (cap[e] && dep[v] == dep[u] + 1) {
                            int d = dfs(v, min(flow - used, cap[e]));
                            cap[e] -= d; cap[e ^ 1] += d;
                            used += d;
                            if (used == flow) return used;
                        }
                    }
                    return used;
                }
            </script>
        </codeblock>
