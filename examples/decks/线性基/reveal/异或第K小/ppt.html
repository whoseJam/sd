<section>
    <section>
        <h1>异或第 $k$ 小</h1>
    </section>
    <section>
        <h2>做法</h2>
        <p>把线性基化为<b>对角形</b>（每个 $b[i]$ 不含其他 $b[j]$ 的高位 1）。然后 $k$ 写成二进制对应基中元素的选 / 不选，凑出第 $k$ 小。</p>
        <p class="fragment">注意：原数列若<b>线性相关</b>（有数能被基表出），异或集合包含 0 — 需要把 $k$ 减 1 处理。</p>
    </section>
</section>
