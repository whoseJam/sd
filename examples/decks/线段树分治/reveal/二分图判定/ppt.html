<section>
    <section>
        <h1>二分图判定</h1>
        <p>luogu P5787</p>
    </section>
    <section>
        <h2>题意</h2>
        <p>每条边在 $[t_l, t_r]$ 区间存在，每个时刻问图是否二分图。</p>
    </section>
    <section>
        <h2>做法</h2>
        <p>按 DSU + 边权奇偶判二分图（带权并查集，能否回退）。</p>
        <p class="fragment">边按存在区间挂时序线段树节点，DFS 每节点 push 边（按秩合并、能撤回），到达叶子时若有偶环则当前时刻不是二分图。</p>
    </section>
</section>
