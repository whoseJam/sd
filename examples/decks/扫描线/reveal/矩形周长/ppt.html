<section>
    <section>
        <h1>矩形周长</h1>
    </section>
    <section>
        <h2>矩形周长</h2>
        <sd-animation src="../../animation/矩形周长/矩形周长.js"
            style="width: 1000px; height: 400px;"></sd-animation>
        <p class="fragment">只需要维护，在每个 $y$ 坐标上线段覆盖的<b>变化量</b>，就能统计横着的边的总长度了。</p>
        <codeblock class="fragment">
            <script type="text/template">
                // 对每种 y 坐标
                int current = Ask();
                ans += abs(current - lastans);
                lastans = current;
            </script>
        </codeblock>
    </section>
    <section>
        <h2>竖边</h2>
        <p>对于竖着的边，把矩形整体旋转 $90^\circ$，再当作横着的边统计一次。</p>
        <codeblock class="fragment">
            <script type="text/template">
                int x = Solve();
                for (int i = 1; i <= n; i++) {
                    swap(R[i].x, R[i].y);
                    swap(R[i].width, R[i].height);
                }
                int y = Solve();
                cout << x + y << '\n';
            </script>
        </codeblock>
    </section>
</section>
