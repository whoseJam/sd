<section>
    <section>
        <h1>运输计划</h1>
        <p>luogu P2680</p>
    </section>
    <section>
        <h2>题意</h2>
        <p>给若干条路径，可以将一条树边的边权变为 $0$，最小化最长路径长度。</p>
        <sd-animation src="../../animation/运输计划/样例解释.js" class="fragment"
            style="margin: 0 auto; width: 540px; height: 320px;"></sd-animation>
    </section>
    <section>
        <h2>思路</h2>
        <p>二分答案 $L$：所有长度 $> L$ 的路径必须共享同一条要置零的边，且该边的边权 $\ge \max(\text{len}) - L$。</p>
        <p class="fragment">"被多少条超长路径同时覆盖" 用边差分一次性算出来。</p>
    </section>
</section>
