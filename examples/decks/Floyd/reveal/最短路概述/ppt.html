    <section>
        <h1>最短路</h1>
    </section>
    <section>
        <h2>算法一览</h2>
        <table>
            <thead>
                <tr><th>算法</th><th>适用</th><th>复杂度</th></tr>
            </thead>
            <tbody>
                <tr><td>Floyd</td><td>无负环任意图，全源最短路</td><td>$O(n^3)$</td></tr>
                <tr><td>Dijkstra</td><td>非负权图，单源</td><td>$O((n+m) \log n)$</td></tr>
                <tr><td>SPFA</td><td>任意图，单源</td><td>最坏 $O(nm)$</td></tr>
                <tr><td>BFS</td><td>边权相同，单源</td><td>$O(n + m)$</td></tr>
                <tr><td>01-BFS</td><td>边权 0 / 1，单源</td><td>$O(n + m)$</td></tr>
                <tr><td>拓扑排序</td><td>DAG，单源</td><td>$O(n + m)$</td></tr>
            </tbody>
        </table>
    </section>
</section>
