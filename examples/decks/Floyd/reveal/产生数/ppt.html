        <h2>题意</h2>
        <p>$n = \overline{a_1 a_2 \dots a_k}$ 的每个数码可独立按变换规则替换。求最终可生成多少不同数字。</p>

    <section>
        <h2>传递闭包</h2>
        <p>$0 \sim 9$ 当节点，变换当边。求每个数码的传递闭包大小 $|S_i|$，答案 $= \prod |S_i|$。</p>
