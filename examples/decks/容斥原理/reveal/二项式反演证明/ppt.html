<section>
    <section>
        <h1>二项式反演证明</h1>
    </section>
    <section>
        <h2>定理</h2>
        <p>
            $$f(n) = \sum_{k = 0}^{n} \binom{n}{k} g(k) \iff g(n) = \sum_{k = 0}^{n} (-1)^{n - k} \binom{n}{k} f(k)$$
        </p>
    </section>
    <section>
        <h2>常见应用</h2>
        <p>"至少有 $k$ 种" 和 "恰好有 $k$ 种" 互相反演 — 第三类容斥的代数形式。</p>
    </section>
</section>
