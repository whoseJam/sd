<section>
    <section>
        <h1>与众不同</h1>
        <p>LOJ 10121</p>
    </section>
    <section>
        <h2>题意</h2>
        <p>多次询问区间 $[L, R]$ 中最长的元素互不相同子区间长度。</p>
        <sd-animation src="../../animation/与众不同/贪心.js" class="fragment"
            style="margin: 0 auto; width: 460px; height: 140px;"></sd-animation>
        <p class="fragment">对每个 $l$ 预处理 $F_l$ = 以 $l$ 为左端点的最长 unique 区间右端点。</p>
    </section>
    <section>
        <h2>预处理 $F_l$</h2>
        <p>$l$ 为左端点时贡献为 $\min(R, F_l) - l + 1$。</p>
        <sd-animation src="../../animation/与众不同/与众不同.js" class="fragment"
            style="margin: 0 auto; width: 540px; height: 240px;"></sd-animation>
        <p class="fragment">分类：$F_l \le R$ 时贡献 $F_l - l + 1$，否则 $R - l + 1$。</p>
        <p class="fragment">前者用 ST 表查 $\max(F_l - l)$，后者用最小 $l$。</p>
    </section>
</section>
