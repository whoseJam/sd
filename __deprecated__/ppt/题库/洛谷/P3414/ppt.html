    <section>
        <h2>组合数</h2>
        <p>尝试从组合意义的角度去理解这个和式：
            $$
            \sum_{i是偶数}C_n^i
            $$
        </p>
        <p class="fragment">只要从 $n$ 个元素选出偶数个元素来就行</p>
        <ul>
            <li class="fragment">我们先在前 $n-1$ 个元素里面随便选</li>
            <li class="fragment">再根据前 $n-1$ 个元素中选出了奇数个数字，还是偶数个数字，决定最后一个元素选或者不选</li>
        </ul>
        <p class="fragment quote">可以发现最后一个元素的选择是被动的</p>
        <p class="fragment">所以答案就是 $2^{n-1}$</p>
    </section>
</section>
