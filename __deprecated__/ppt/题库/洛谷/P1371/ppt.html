    <section>
        <h1>NOI元丹</h1>
    </section>
    <problem data-source="https://www.luogu.com.cn/problem/P1371"></problem>
    <section>
        <h2>NOI元丹</h2>
        <p>从一个序列 $\{s\}$ 里面选一个长度为 $3$，格式为 $NOI$ 的子序列，求方案数</p>
        <sd-animation src="./样例解释.js"
            style="width: 1000px; height: 150px;"></sd-animation>
        <p class="fragment quote">序列构造动态规划模型+子序列动态规划模型</p>
        <p class="fragment">设 $f_{i,1/2/3}$ 表示最后一个元素在 $i$ 上，取到了 $NOI$ 中的 $1/2/3$ 个字符的方案数</p>
        <p class="fragment math-fragment">
            $$
            \begin{cases}
            f_{i,1}=[s_i=N] \\
            f_{i,2}=[s_i=O]\sum_{j\lt i} f_{j,1} \\
            f_{i,3}=[s_i=I]\sum_{j\lt i} f_{j,2}
            \end{cases}
            $$
        </p>
    </section>
</section>
