    <section>

    <problem data-source="https://www.luogu.com.cn/problem/P2054"></problem>
    <section>
        <h2>洗牌</h2>
        <p>观察一下洗牌过程</p>
        <sd-animation src="./洗牌.js"
            style="width: 1000px; height: 400px;"></sd-animation>
        <ul>
            <li class="fragment">当 $1\le i\le \frac{n}{2}$ 的时候，$i\rightarrow 2i$</li>
            <li class="fragment">当 $\frac{n}{2}\lt i\le n$ 的时候，$i\rightarrow 2(i-\frac{n}{2})-1\rightarrow 2i-n-1$</li>
        </ul>
        <p class="fragment">我们得以统一两种变化情况——$i\rightarrow 2i\% (n+1)$</p>
    </section>
    <section>
        <h2>洗牌</h2>
        <p>题目希望知道洗牌洗 $M$ 次，位于第 $L$ 个位置上的扑克牌是什么</p>
        <p class="fragment">
            $$
            2^Mx\equiv L(mod\ n+1)
            $$
        </p>
        <p class="fragment">解出 $x$ 即可</p>
    </section>
</section>
