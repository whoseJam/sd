<section>
    <section>
        <h1>货车运输</h1>
    </section>
    <problem data-source="https://www.luogu.com.cn/problem/P1967"></problem>
    <section>
        <h2>货车运输</h2>
        <p>有一个城市交通网络，每条道路上有一个<b style="color: purple;">限重</b></p>
        <sd-animation src="./最大生成树.js"
            style="width: 1000px; height: 300px;"></sd-animation>
        <p class="fragment">多次询问，每次询问给定两个点 $x,y$，求如果从 $x$ 运送货物到 $y$，在不超过道路限重的情况下，一次最多能送多重的货物</p>
        <p class="fragment">由于我们并不关心走的路有多长，只关心最大限重，所以我们对交通网络求一个最大生成树，并约定运货只能在最大生成树上进行</p>
        <p class="fragment">对每次询问，求树上两个点之间的最小树边权，即为<b style="color: red;">运货载重的瓶颈</b></p>
    </section>
    <section>
        <h2>货车运输</h2>
        <p>树上两点之间的最小树边权，可以在求 $LCA$ 的时候顺便处理出来</p>
        <sd-animation src="./最小树边权.js" class="fragment"
            style="width: 1000px; height: 400px;"></sd-animation>
        <codeblock class="fragment">
            <script type="text/template">
                fa[u][0] = f;
                mn[u][0] = v;
                for (int i = 1; i <= 20; i++) {
                    fa[u][i] = fa[fa[u][i - 1]][i - 1];
                    mn[u][i] = min(mn[u][i - 1], mn[fa[u][i - 1]][i - 1]);
                }
            </script>
        </codeblock>
    </section>
</section>
