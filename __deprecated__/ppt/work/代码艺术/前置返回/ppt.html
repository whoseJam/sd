        <h2>前置返回</h2>
        <codeblock>
            <script type="text/template">
                void triggerAttack(Character character) {
                    if (character.isReady) {
                        if (character.onGround) {
                            if (!character.isMoving) {
                                character.attack();
                            } else cout << "character is moving\n";
                        } else cout << "character is not on the ground\n";
                    } else cout << "character is not ready\n";
                }
            </script>
        </codeblock>

        <codeblock class="fragment">
            <script type="text/template">
                void triggerAttack(Character character) {
                    if (!character.isReady) {
                        cout << "character is not ready\n"; return;
                    }
                    if (!character.onGround) {
                        cout << "character is not on the ground\n"; return;
                    }
                    if (character.isMoving) {
                        cout << "character not moving\n"; return;
                    }
                    character.attack();
                }
            </script>
