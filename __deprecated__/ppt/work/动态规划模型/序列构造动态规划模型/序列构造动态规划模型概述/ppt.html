    <section>
        <h1>序列构造动态规划模型</h1>
    </section>
    <section>
        <h2>序列构造动态规划模型</h2>
        <p>我们希望构造满足<b style="color: red;">某些要求</b>的序列<span class="fragment">，我们可能需要统计这样的序列的<b>得分最大值/得分最小值/方案数</b></span></p>
        <div class="fragment quote">
            <h3>要求</h3>
            <span>可能是这个序列的元素之和必须等于 $k$，可能是这个序列的相邻两项之和必须是偶数</span>
        </div>
        <p class="fragment">一般我们会<b>逐项构造</b>出这个序列，并设 $f_{i,?}$ 表示序列构造到第 $i$ 位序列的<b>得分最大值/得分最小值/方案数</b></p>
        <sd-animation src="./状态设置.js" class="fragment"
            style="width: 1000px; height: 150px;"></sd-animation>
        <p class="fragment quote" style="margin-top: 0px;">$?$ 表示某些辅助信息，我们可以借助辅助信息判断序列是否是满足要求的</p>
        <p class="fragment">
            $$
            f_{i,?}\stackrel{更新}{\rightarrow} f_{i+1,?}
            $$
        </p>
    </section>
</section>
