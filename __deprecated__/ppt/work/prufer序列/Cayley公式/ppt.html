    <section>
        <h2>Caylay公式</h2>
        <p>一个 $n$ 个点的完全图有多少棵不同的生成树？</p>
        <p class="fragment">
            $$
            n^{n-2}
            $$
        </p>
        <p class="fragment">一棵生成树可以和一个长度 $n-2$ 的序列对应起来，由于原图是完全图，没有任何连边的限制，所以我们就是在算值域 $[1,n]$，长度为 $n-2$ 的序列有多少种</p>
    </section>
