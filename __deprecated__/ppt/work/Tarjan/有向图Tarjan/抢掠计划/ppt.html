    <section>

    <section>
        <h2>抢掠计划</h2>

            style="width: 1000px; height: 300px;"></sd-animation>

        <p class="fragment">在缩点之后的DAG里面，定义路径的长度为路径上的点的点权之和，做一个最长路即可</p>
