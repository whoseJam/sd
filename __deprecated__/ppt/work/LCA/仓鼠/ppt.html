    <section>
        <h1>仓鼠</h1>
    </section>
    <problem data-source="https://www.luogu.com.cn/problem/P3398"></problem>
    <section>
        <h2>仓鼠</h2>
        <p>查询树上 $a\rightarrow b,c\rightarrow d$ 两条路径是否相交</p>
        <sd-animation src="./仓鼠.html" class="fragment"
            style="width: 1000px; height: 400px;"></sd-animation>
        <p class="fragment">设 $x=LCA(a,b),y=LCA(c,d)$，如果路径相交，则</p>
        <ul>
            <li class="fragment">要么 $x$ 在 $c\rightarrow d$ 这条路径上</li>
            <li class="fragment">要么 $y$ 在 $a\rightarrow b$ 这条路径上</li>
        </ul>
    </section>
    <section>
        <h2>仓鼠</h2>
        <p class="quote">如何检查一个点在一条路径上呢？</p>
        <p class="fragment">如果 $x$ 在 $c\rightarrow d$ 这条路径上，则一定有
            $$
            dis(x,c)+dis(x,d)=dis(c,d)
            $$
        </p>
    </section>
</section>
