    <problem data-source="https://www.luogu.com.cn/problem/P4869"></problem>
    <section>
        <h2>albus就是要第一个出场</h2>
        <p>有 $n$ 个二进制数形成 $2^n$ 个异或线性组合，把这 $2^n$ 个结果升序排列成一个序列</p>
        <p>你需要确定某个数字 $x$ 在序列中第一次出现的位置</p>
    </section>
    <section>
        <h2>albus就是要第一个出场</h2>
        <sd-animation src="./决策树.js"
            style="width: 1000px; height: 300px;"></sd-animation>
        <p>记录一下没能进入线性基的向量数量 $c$，它们可以被视为是 $0$</p>
        <p class="fragment">对于线性基能表达出的任意一个组合结果，都可以再组合上任意个 $0$ 保持结果不变，所以最终每个组合结果在序列中出现了 $2^c$ 次</p>
        <p class="fragment">在决策树上二分答案，最终答案在二分结果上乘以 $2^c$ 即可</p>
    </section>
</section>
