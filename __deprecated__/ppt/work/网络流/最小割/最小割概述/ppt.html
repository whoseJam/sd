        <p>最大流的另一种视角</p>
    </section>
    <section>
        <h2>最小割</h2>
        <p>在一张网络流图中，如果我要把一些边切断，使得再也没有任何一条流能从源点到汇点，请问至少要割掉总容量为多少的边</p>
    </section>
    <section>
        <h2>最大流最小割定理</h2>
        <p>一个网络流图的最大流等于其最小割</p>
        <div class="fragment quote">
            <p style="margin-top: 0px;">
                最大流会把源点到汇点的所有可行路都堵满，那么把这些路都切断，肯定就不存在流能从源点到汇点了；
                而如果最大流减少一流，那么一定就还存在从源点到汇点的路径；所以最大流能对应一个最小割
            </p>
            <p class="fragment" style="margin-bottom: 0px;"><del>严格证明有点麻烦，在此略过</del></p>
        </div>
