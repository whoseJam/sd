<section>
    <section>
        <h1>sd动画引擎</h1>
        <p>whoseJam</p>
    </section>
    <section>
        <h2>效果展示</h2>
        <sd-animation src="./树链剖分.js"
            style="width: 1000px; height: 500px;"></sd-animation>
    </section>
    <section>
        <h2>效果展示</h2>
        <sd-animation src="./可持久化线段树.js"
            style="width: 1000px; height: 500px;"></sd-animation>
    </section>
    <section>
        <h2>程序动画</h2>
        <p><b>程序动画</b>依靠<b>代码</b>驱动动画场景的变更</p>
        <p class="fragment">相比于传统动画制作方案，程序动画还带来了更多好玩的特性...</p>
    </section>
    <section>
        <h2>可交互性</h2>
        <sd-animation src="./阶梯博弈.js"
            style="width: 1000px; height: 300px;"></sd-animation>
        <codeblock class="fragment" lang="js">
            <script type="text/template">
                // 只要发生了点击，就把当前的小球移动到下一个台阶上
                arrs[curIndex].startAnimate();
                arrs[curIndex].dropElement(curRank);
                arrs[curIndex].cx(CX(curIndex));
                arrs[curIndex].endAnimate();
                curRank = arrs[curIndex - 1].length();
                curIndex--;
                arrs[curIndex]
                    .startAnimate()
                    .pushFromExistElement(circ)
                    .cx(CX(curIndex))
                    .endAnimate();
            </script>
        </codeblock>
    </section>
    <section>
        <h2>随机性</h2>
        <sd-animation src="./炮兵阵地.js"
            style="width: 1000px; height: 300px;"></sd-animation>
        <codeblock class="fragment" lang="js">
            <script type="text/template">
                grid.forEachElement(element => {
                    const x = sd.rand(0, 100) <= 50 ? C.green : C.grey;
                    element.color(x);
                });
            </script>
        </codeblock>
    </section>
    <section>
        <h2>响应式</h2>
        <p>元素之间可以存在<b>关系</b>，这些关系之间的<b>影响</b>通过响应式变量传递</p>
        <p class="fragment quote">假设我想描述两个矩形，内层矩形是外层矩形的 $\frac 1 2$ 缩放</p>
        <sd-animation src="./响应式变量.js" class="fragment"
            style="width: 1000px; height: 200px;"></sd-animation>
        <codeblock class="fragment">
            <script type="text/template">
                const r1 = new sd.Rect(svg);
                const r2 = new sd.Rect(svg);
                r1.childAs(r2, function (parent, child) {
                    child.width(parent.width() / 2);
                    child.height(parent.height() / 2);
                    child.center(parent.center());
                });
            </script>
        </codeblock>
    </section>
</section>
