    <section>
        <h2>整除</h2>
        <p>如果一个数字 $A$ 是另一个数字 $B$ 的因子，设
            $$
            \begin{cases}
            A=p_1^{a_1}p_2^{a_2}...p_k^{a_k} \\
            B=p_1^{b_1}p_2^{b_2}...p_k^{b_k}
            \end{cases}
            $$
        </p>
        <p class="fragment">则一定有 $a_1\le b_1,a_2\le b_2,...,a_n\le b_n$</p>
