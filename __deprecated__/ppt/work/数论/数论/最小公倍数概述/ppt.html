    <section>
        <h1>最小公倍数</h1>
    </section>
    <section>
        <h2>最小公倍数</h2>
        <p>
            $$
            lcm(a,b)=\frac{ab}{gcd(a,b)}
            $$
        </p>
    </section>
    <section>
        <h2>最小公倍数</h2>
        <p>如果 $C=lcm(A,B)$，且
            $$
            \begin{cases}
            A=p_1^{a_1}p_2^{a_2}...p_k^{a_k} \\
            B=p_1^{b_1}p_2^{b_2}...p_k^{b_k} 
            \end{cases}
            $$
        </p>
        <p class="fragment">则
            $$
            C=p_1^{max(a_1,b_1)}p_2^{max(a_2,b_2)}...p_k^{max(a_k,b_k)}
            $$
        </p>
    </section>
</section>
