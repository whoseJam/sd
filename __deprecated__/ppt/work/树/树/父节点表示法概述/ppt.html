    <section>
        <h2>父亲表示法</h2>
        <p>由于每个节点只有一个父节点，所有可以定义一个 $father$ 数组，把每个节点的父节点存下来</p>
        <p class="fragment">整个树的结构自然也就保存下来了</p>
        <codeblock class="fragment">
            <script type="text/template">
                const int N = 100005;
                int fa[N];
                void Link(int u, int v) { // u -> v 有一条边
                    fa[v] = u;
                }
            </script>
        </codeblock>
    </section>
</section>
