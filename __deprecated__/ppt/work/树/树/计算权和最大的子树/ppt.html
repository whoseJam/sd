        <codeblock>
            <script type="text/template">
                int sum[N];
                void Dfs(int u, int f) {
                    sum[u] += val[u];
                    for (int v : G[u]) {
                        if (v == f) continue;
                        Dfs(v, u);
                        sum[u] += sum[v];
                    }
                }
            </script>
