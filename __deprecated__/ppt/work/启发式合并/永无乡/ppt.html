    <problem data-problemset="luogu" data-problemid="P3224"></problem>
    <section>
        <h2>永无乡</h2>
        <p>给定 $n$ 个元素，每个元素有自己的权值，现在需要支持以下两种操作：</p>
        <ol>
            <li><code>B x y</code>：把 $x$ 和 $y$ 所在的集合做合并</li>
            <li><code>Q x k</code>：查询 $x$ 所在集合中，权值第 $k$ 小的元素</li>
        </ol>
    </section>
    <section>
        <h2>永无乡</h2>
        <p>用Splay来维护一个集合，Splay自然就能找一个集合中的第 $k$ 大了</p>
        <p class="fragment">当两个集合要发生合并时，使用启发式合并，Splay大小更小的集合往Splay大小更大的集合做插入</p>
    </section>
</section>
