<section>
    <section>
        <h1>失配树</h1>
    </section>
    <section>
        <h2>失配树</h2>
        <div style="display: flex;">
            <sd-animation src="./失配树.js"
                style="width: 70%; height: 600px;"></sd-animation>
            <div style="width: 40%; margin-left: -30px;">
                <p>我们可以借助 $\{len_i\}$ 建立出一棵<b style="color: red;">失配树</b>，这棵树是这样定义的</p>
                <ul>
                    <li class="fragment">一个节点代表原字符串的一个前缀</li>
                    <li class="fragment">$i\rightarrow len_i$ 连一条边</li>
                    <li class="fragment">一个节点 $u$ 所有祖先，都是该节点的 $border$</li>
                    <ul>
                        <li class="fragment">越靠近 $u$ 的祖先，<b>对应字符串</b>长度越长</li>
                        <li class="fragment">越远离 $u$ 的祖先，<b>对应字符串</b>长度越短</li>
                    </ul>
                </ul>
                <p class="fragment quote">当失配发生时，就是在这棵失配树上不断爬祖先</p>
            </div>
        </div>
    </section>
</section>
