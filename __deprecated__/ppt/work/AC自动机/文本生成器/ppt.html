    <section>
        <h1>文本生成器</h1>

    <problem data-problemset="luogu" data-problemid="P4052"></problem>
    <section>
        <h2>文本生成器</h2>
        <p>所谓可读文本数量，就是trie图上经过至少一个终止点的、长度为 $m$ 的路径数量</p>
        <p class="fragment">设 $f_{i,u,0/1}$ 表示走 $i$ 个单位的距离，当前位于trie图上的 $u$ 点，没有/有经过终止点的方案数</p>
        <div class="fragment">
            <p>
                $$
                f_{i,u,end}\stackrel{+}{\rightarrow} f_{i+1,v,end|isEnd(v)}
                $$
            </p>
            <sd-animation src="./状态转移.js"
                style="width: 1000px; height: 150px;"></sd-animation>
        </div>
        <p class="fragment">
            $$
            answer=\sum_{u}f_{m,u,1}
            $$
        </p>
    </section>
</section>
