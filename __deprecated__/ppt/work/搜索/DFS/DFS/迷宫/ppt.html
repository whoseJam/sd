    <problem data-source="https://www.luogu.com.cn/problem/P1605"></problem>
    <section>
        <h2>迷宫</h2>
        <p>一个 $n\times m$ 的迷宫内有 $T$ 处障碍，障碍不可通过</p>
        <p class="fragment">角色可以上下左右移动</p>
        <p class="fragment">求从 $(sx,sy)$ 到 $(fx,fy)$ 的路径方案数</p>
    </section>
    <section>
        <h2>迷宫</h2>
        <p>第一步，定义问题</p>
        <p class="fragment">我们需要在迷宫上进行若干步行动决策</p>
        <codeblock class="fragment">
            <script type="text/template">
                // 角色行动到迷宫的 (x, y) 上
                // 有若干个格子已经被走过了
                // 统计最终走到 (fx, fy) 上的方案数
                void Dfs(int x, int y) {
                }
            </script>
        </codeblock>
        <sd-animation src="./问题定义.js" class="fragment"
            style="width: 1000px; height: 200px;"></sd-animation>
    </section>
    <section>
        <h2>迷宫</h2>
        <p>第二步，实现问题</p>
        <sd-animation src="./问题实现.js" class="fragment"
            style="width: 1000px; height: 200px;"></sd-animation>
        <codeblock class="fragment">
            <script type="text/template">
                bool vis[N][N];
                void Dfs(int x, int y) {
                    for (int i = 0; i <= 3; i++) {
                        int tx = x + dx[i]; // dx = [1, 0, -1, 0];
                        int ty = y + dy[i]; // dy = [0, 1, 0, -1];
                        if (1 <= tx && tx <= n && 1 <= ty && ty <= m &&
                            !vis[tx][ty] && mp[tx][ty] != 1) {
                            vis[tx][ty] = true;
                            Dfs(tx, ty);
                            vis[tx][ty] = false;
                        }
                    }
                }
            </script>
        </codeblock>
    </section>
    <section>
        <h2>迷宫</h2>
        <p>第三步，处理边界</p>
        <sd-animation src="./问题边界.js"
            style="width: 1000px; height: 200px;"></sd-animation>
        <codeblock class="fragment">
            <script type="text/template">
                bool vis[N][N];
                void Dfs(int x, int y) {
                    if (x == fx && y == fy) { ans++; return; }
                    for (int i = 0; i <= 3; i++) {
                        int tx = x + dx[i]; // dx = [1, 0, -1, 0];
                        int ty = y + dy[i]; // dy = [0, 1, 0, -1];
                        if (1 <= tx && tx <= n && 1 <= ty && ty <= m &&
                            !vis[tx][ty] && mp[tx][ty] != 1) {
                            vis[tx][ty] = true;
                            Dfs(tx, ty);
                            vis[tx][ty] = false;
                        }
                    }
                }
            </script>
        </codeblock>
    </section>
    <section>
        <h2>迷宫</h2>
        <sd-animation src="./DFS.js"
            style="width: 1000px; height: 600px;"></sd-animation>
    </section>
</section>
