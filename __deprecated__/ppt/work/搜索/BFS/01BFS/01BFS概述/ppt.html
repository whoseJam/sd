<section>
    <section>
        <h1>01BFS</h1>
    </section>
    <section>
        <h2>01BFS</h2>
        <ul>
            <li>把起点加入<b>双端队列</b></li>
            <li class="fragment">只要队列非空，取队头 $u$，用 $u$ 更新周围节点</li>
            <li class="fragment">如果可以更新的话
                <ol>
                    <li class="fragment">边权为 $0$，放队头</li>
                    <li class="fragment">边权为 $1$，放队尾</li>
                </ol>
            </li>
        </ul>
        <div style="display: flex; align-items: center;">
            <codeblock class="fragment">
                <script type="text/template">
                    void Bfs01() {
                        deque < int > q; q.push_back(S); dis[S] = 0;
                        while (q.size()) {
                            int u = q.front(); q.pop_front();
                            if (vis[u]) continue;
                            vis[u] = 1;
                            for (int i = 0; i < G[u].size(); i++) {
                                int v = G[u][i].to;
                                int w = G[u][i].val;
                                if (dis[v] > dis[u] + w) {
                                    dis[v] = dis[u] + w;
                                    if (w == 0) q.push_front(v);
                                    else q.push_back(v);
                                }
                            }
                        }
                    }
                </script>
            </codeblock>
            <sd-animation src="./01BFS竖版.js" class="fragment"
                style="width: 1000px; height: 400px; margin-left: 20px;"></sd-animation>
        </div>
    </section>
</section>
