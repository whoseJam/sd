        <p>修剪搜索树</p>

    <section>
        <h2>剪枝</h2>
        <p>有些题目的搜索树可能很庞大</p>
        <p class="fragment">但不是所有节点都能通往终止节点</p>
        <p class="fragment quote">我们把不能通往终止节点的点称为<b>无效点</b></p>
        <p class="fragment">如果我们能尽可能早地判断出<b>无效点</b>，就能将搜索树切削得更小，获得更高的搜索效率</p>
    </section>
