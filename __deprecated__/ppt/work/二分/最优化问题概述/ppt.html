    <section>
        <h2>最优化问题</h2>
        <p>在某些题目中，题目可能会让你构造一个符合题意的方案，<b style="color: purple;">最大化方案的得分</b>，或者<b style="color: red;">最小化方案的得分</b></p>
        <p class="fragment">这些问题都是最优化问题，而部分最优化问题可以转化为判定性问题来解决</p>
        <div class="fragment quote">
            <h3>举个例子</h3>
            <p>你需要构造一种符合题意的方案，有一个打分函数可以为你所构造出来的方案进行打分，你需要<b style="color: purple;">最大化</b>你的得分，但直接思考怎么最大化得分是比较困难的</p>
            <span class="fragment">此时可以转而思考得分等于 $s$ 的方案<b style="color: teal;">能否存在</b>，然后用二分的方法找到可以存在的方案中得分最大的那一个</span>
        </div>
        <sd-animation src="./序列特征.js" class="fragment"
            style="width: 1000px; height: 200px;"></sd-animation>
    </section>
</section>
