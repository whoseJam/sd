    <section>
        <h2>书架</h2>
        <p>如果我们把书架按从上到下的顺序，把书拉成一条序列，那么实际上就需要在序列上支持以下五种操作：</p>
        <ul>
            <li class="fragment"><code>Top</code>：把一本书取出后，插入到序列的开头</li>
            <li class="fragment"><code>Bottom</code>：把一本书取出后，插入到序列的末尾</li>
            <li class="fragment"><code>Insert</code>：把一本书取出后，插入到中间某个指定位置</li>
            <li class="fragment"><code>Ask</code>：查询一本书在序列中的左边有多少本书</li>
            <li class="fragment"><code>Query</code>：查询第 $s$ 本书是什么</li>
        </ul>
        <p class="fragment">Splay解决一切</p>
    </section>
</section>
