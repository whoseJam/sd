        <div class="fragment quote">

                style="width: 800px; height: 400px;"></sd-animation>

    <section>
        <h2>最小路径覆盖</h2>
        <p>利用二分图匹配得到的 $match$ 数组，我们容易得到一种可行方案：</p>
        <codeblock>
            <script type="text/template">
                int cnt = n - MaxMatch();
                for (int i = 1; i <= n; i++)
                    matchedBy[match[i]] = i;
                for (int i = 1; i <= n; i++) {
                    if (!matchedBy[i]) {
                        output(i);
                        cout << '\n';
                    }
                }
            </script>
        </codeblock>
        <p>其中output函数是用来打印一条路径的函数，其实现如下：</p>
        <codeblock>
            <script type="text/template">
                void output(int x) {
                    if (match[x]) output(match[x]);
                    cout << x << ' ';
                }
            </script>
        </codeblock>
    </section>
