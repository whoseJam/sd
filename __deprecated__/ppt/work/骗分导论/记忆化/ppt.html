<section>
    <section>
        <h1>记忆化</h1>
        <p>打表怎么不算记忆化</p>
    </section>
    <section>
        <h2>记忆化</h2>
        <p>记忆化通常发生在你把深搜写完以后，如果你的搜索是一个<b>不依赖外部环境的、独立的</b>搜索，那么就可以记忆化</p>
        <div style="display: flex;" class="fragment">
            <codeblock style="width: 40%;">
                <script type="text/template">
                    // 这是一个不依赖外界的深搜
                    int Dfs(int a, int b) {
                        ans = 基于 a 和 b 计算得到
                        return ans;
                    }
                </script>
            </codeblock>
            <codeblock style="width: 55%;">
                <script type="text/template">
                    // 假设 p 数组是可以被 Dfs 或者别的函数修改的
                    int p[100];
                    // 这是一个依赖外界的深搜
                    int Dfs(int a, int b) {
                        ans = 基于 a 和 b 和 p 计算得到
                        return ans;
                    }
                </script>
            </codeblock>
        </div>
        <codeblock class="fragment">
            <script type="text/template">
                int f[a的最大范围][b的最大范围];
                int vis[a的最大范围][b的最大范围];
                void Dfs(int a, int b) {
                    if (vis[a][b]) {
                        return f[a][b];
                    }
                    ans = 基于 a 和 b 计算得到
                    vis[a][b] = 1;
                    f[a][b] = ans;
                    return ans;
                } 
            </script>
        </codeblock>
    </section>
    <section>
        <h2>打表也算记忆化</h2>
        <p>打表就是<b>提前把答案算好并记忆下来</b>，正常的程序把计算放在了评测时，打表则把计算放在了考试时</p>
    </section>
    <problem data-problemset="luogu" data-problemid="P1044"></problem>
    <section>
        <h2>栈</h2>
        <p>注意到本题的 $n\le 18$，所以我们完全能把这个长度为 $18$ 的答案数组打表打出来</p>
    </section>
