    <problem data-problemset="luogu" data-problemid="P1771"></problem>
    <section>
        <h2>方程的解</h2>
        <p>
            $$
            a_1+a_2+...+a_{k-1}+a_k=g(x)
            $$
            求这个方程有多少个正整数解
        </p>
        <p class="fragment">其中 $g(x)=x^x\ mod\ 1000$，$x$ 是题目中给出的已知量</p>
        <p class="fragment quote">
            既然 $x$ 是给出的已知数，那么 $g(x)$ 就当作一个常数 $R$ 就行了
        </p>
        <p class="fragment">如果我们认为每个 $a_i$ 是一个盒子，那么就是在把 $R$ 个元素放进这 $k$ 个盒子，求方案数</p>
        <p class="fragment">用隔板法，答案即为 $C_{R-1}^{k-1}$</p>
    </section>
</section>
