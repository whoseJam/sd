    <section>
        <h1>排列数</h1>
        <p>$A_n^m$</p>
    </section>
    <section>
        <h2>排列数</h2>
        <p>从 $n$ 个不同的元素中，依次选出 $m$ 个元素排成一列，产生的不同排列的数量为
            $$
            A_n^m=\frac{n!}{(n-m)!}=n\times (n-1)\times...\times (n-m+1)
            $$
        </p>
    </section>
</section>
