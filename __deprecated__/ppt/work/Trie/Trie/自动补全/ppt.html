    <problem data-source="https://www.luogu.com.cn/problem/P2237"></problem>
    <section>
        <h2>自动补全</h2>
        <p>能充当字符串 $s$ 自动补全的单词，在trie上一定是 $s$ 的后代</p>
        <sd-animation src="./自动补全.js" class="fragment"
            style="width: 1000px; height: 450px;"></sd-animation>
        <p class="fragment">统计子树内<b>终结节点个数</b>，就能在trie上找字典序第 $k$ 小的后代了</p>
    </section>
    <section>
        <h2>自动补全</h2>
        <sd-animation src="./分类讨论.js"
            style="width: 1000px; height: 300px;"></sd-animation>
        <codeblock>
            <script type="text/template">
                int find(int u, int k) {
                    if (siz[u] < k) return -1;
                    if (flg[u] && k == 1) return flg[u];
                    if (flg[u]) k--;
                    int tmp = 0;
                    for (int i = 0, v; i < 26; i++) {
                        v = ch[u][i];
                        if (!v) continue;
                        if (tmp + siz[v] >= k) return find(v, k - tmp);
                        tmp += siz[v];
                    }
                    return -1;
                }
            </script>
        </codeblock>
    </section>
</section>
