<section>
    <section>
        <h1>更多的树状数组</h1>
        <p>树状数组不仅仅可以用来维护<b>和</b></p>
    </section>
    <section>
        <h2>更多的树状数组</h2>
        <p>这是一个普普通通的树状数组......</p>
        <codeblock>
            <script type="text/template">
                void add(int x, int d) {
                    for (int i = x; i <= n; i += lowbit(i))
                        c[i] += d;
                }
                int sum(int x) {
                    int ans = 0;
                    for (int i = x; i > 0; i -= lowbit(i))
                        ans += c[i];
                    return ans;
                }
            </script>
        </codeblock>
    </section>
    <section>
        <h2>更多的树状数组</h2>
        <p>现在它能处理<b>区间异或和</b>了</p>
        <codeblock>
            <script type="text/template">
                void add(int x, int d) {
                    for (int i = x; i <= n; i += lowbit(i))
                        c[i] ^= d;
                }
                int sum(int x) {
                    int ans = 0;
                    for (int i = x; i > 0; i -= lowbit(i))
                        ans ^= c[i];
                    return ans;
                }
            </script>
        </codeblock>
    </section>
    <section>
        <h2>更多的树状数组</h2>
        <p>现在它能处理<b>前缀最大值</b>了</p>
        <codeblock>
            <script type="text/template">
                void add(int x, int d) {
                    for (int i = x; i <= n; i += lowbit(i))
                        c[i] = max(c[i], d);
                }
                int query(int x) {
                    int ans = 0;
                    for (int i = x; i > 0; i -= lowbit(i))
                        ans = max(ans, c[i]);
                    return ans;
                }
            </script>
        </codeblock>
    </section>
    <section>
        <h2>更多的树状数组</h2>
        <p>现在它能处理<b>前缀最小值</b>了</p>
        <codeblock>
            <script type="text/template">
                void add(int x, int d) {
                    for (int i = x; i <= n; i += lowbit(i))
                        c[i] = min(c[i], d);
                }
                int query(int x) {
                    int ans = 0;
                    for (int i = x; i > 0; i -= lowbit(i))
                        ans = min(ans, c[i]);
                    return ans;
                }
            </script>
        </codeblock>
    </section>
</section>
