    <section>
        <h1>缩减状态空间</h1>
    </section>
    <section>
        <h2>状态定义</h2>
        <p>一个问题可能有多个视角，站在<b>其中一个视角下的状态空间</b>可能远大于<b>另一个视角下的状态空间</b></p>
    </section>
    <section>
        <h2>状态冗余位</h2>
        <p>一个状态可能形容 $f(a,b,c,d,e)$，但稍加思索可能发现当 $a,b,c,d$ 确定下来后，$e$ 是唯一确定的</p>
        <p class="fragment">我们就认为 $e$ 占用了一个<b style="color: purple;">冗余位</b></p>
        <a class="fragment" href="https://www.luogu.com.cn/problem/P1006" target="_blank">经典题目：传纸条</a>
    </section>
</section>
