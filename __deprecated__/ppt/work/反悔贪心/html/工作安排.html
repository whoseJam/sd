    <problem data-src="http://43.143.204.105/problem/732"></problem>
    <section>
        <h2>工作安排</h2>
        <p>我们把所用工作按照<b>截止时间</b>从小到大排序</p>
        <p class="fragment">依次枚举每个工作</p>
        <ul>
            <li class="fragment">如果当前工作有时间做，就无脑做</li>
            <li class="fragment">如果当前工作没时间做</li>
            <ul>
                <li class="fragment">如果<b>之前决定要做的某个工作</b>的收益比当前工作小，<b>反悔</b>之前的工作，转而做当前这个工作</li>
                <li class="fragment">如果<b>之前决定要做的所有工作</b>的收益都比当前工作大，就放掉当前这个工作</li>
            </ul>
        </ul>
    </section>
</section>
