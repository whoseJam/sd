    <problem data-source="https://www.luogu.com.cn/problem/P2504"></problem>
    <section>
        <h2>聪明的猴子</h2>
        <p>我们把树当作节点，把树之间的距离当作两个节点之间的连边的边权</p>
        <p class="fragment">我们需要根据每只猴子的最远跳跃距离，判断每只猴子能否到达所有节点</p>
        <p class="fragment">那么只需要把最小生成树建立出来，判断最小生成树的最长边能否被每只猴子跳过即可</p>
        <p class="fragment">注意到本题需要做最小生成树的图实际上是一个完全图，是一个稠密图，所以更适合用Prim来做最小生成树<del>（当然Kruskal也能做）</del></p>
    </section>
</section>
