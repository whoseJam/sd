<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>sd remote chat</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    display: flex;
    flex-direction: column;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", system-ui, sans-serif;
    background: #1a1a1a;
    color: #eee;
    -webkit-text-size-adjust: 100%;
  }
  header {
    padding: 10px 16px;
    background: #2a2a2a;
    border-bottom: 1px solid #444;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    padding-top: env(safe-area-inset-top, 10px);
  }
  .title { font-size: 13px; font-weight: 600; color: #ffa647; }
  .status-pill {
    background: transparent;
    border: 1px solid #555;
    color: #ccc;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
    cursor: default;
  }
  .status-pill.alive { color: #5cd57d; border-color: #2e5a39; }
  .status-pill.down { color: #ff7878; border-color: #5a2e2e; cursor: pointer; }
  .status-pill.down:active { background: #3a1f1f; }
  .status-pill .dot {
    width: 6px; height: 6px; border-radius: 50%; background: #888;
  }
  .status-pill.alive .dot { background: #5cd57d; }
  .status-pill.down .dot { background: #ff7878; }
  .links { font-size: 11px; }
  .links a { color: #888; text-decoration: none; margin-left: 8px; }
  .links a:hover { color: #ccc; }
  main {
    flex: 1;
    overflow-y: auto;
    padding: 12px 12px 0;
    -webkit-overflow-scrolling: touch;
  }
  .msg {
    margin-bottom: 8px;
    display: flex;
  }
  .msg.user { justify-content: flex-end; }
  .msg.agent { justify-content: flex-start; }
  .msg.system { justify-content: center; }
  .bubble {
    max-width: 82%;
    padding: 8px 12px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.45;
    word-wrap: break-word;
    white-space: pre-wrap;
  }
  .user .bubble { background: #0a84ff; color: #fff; border-bottom-right-radius: 4px; }
  .agent .bubble { background: #2a2a2a; color: #eee; border-bottom-left-radius: 4px; }
  .system .bubble {
    background: transparent;
    color: #666;
    font-size: 11px;
    font-style: italic;
    text-align: center;
  }
  .images { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .images img {
    max-width: 200px;
    max-height: 280px;
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
  }
  footer {
    padding: 8px 8px;
    background: #2a2a2a;
    border-top: 1px solid #444;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    padding-bottom: calc(env(safe-area-inset-bottom, 8px) + 8px);
  }
  textarea {
    flex: 1;
    resize: none;
    background: #1a1a1a;
    border: 1px solid #444;
    color: #eee;
    padding: 8px 10px;
    border-radius: 18px;
    font: inherit;
    font-size: 15px;
    height: 36px;
    min-height: 36px;
    max-height: 120px;
    -webkit-appearance: none;
  }
  textarea:focus { outline: none; border-color: #0a84ff; }
  button {
    background: #0a84ff;
    border: none;
    color: white;
    padding: 0 16px;
    border-radius: 18px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    flex-shrink: 0;
    -webkit-appearance: none;
    height: 36px;
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
<header>
  <div class="title">sd remote</div>
  <button class="status-pill" id="status" type="button">
    <span class="dot"></span>
    <span id="status-text">checking…</span>
  </button>
  <div class="links">
    <a href="/reveal/index.html" target="_blank">preview</a>
  </div>
</header>
<main id="messages"></main>
<footer>
  <textarea id="input" placeholder="Send a message..." rows="1"></textarea>
  <button id="send">Send</button>
</footer>
<script>
const messages = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
let lastTs = 0;
const seen = new Set();

function renderMsg(m) {
  if (seen.has(m.id)) return;
  seen.add(m.id);
  const div = document.createElement('div');
  div.className = 'msg ' + m.from;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (m.text) {
    const span = document.createElement('span');
    span.textContent = m.text;
    bubble.appendChild(span);
  }
  if (m.images && m.images.length) {
    const wrap = document.createElement('div');
    wrap.className = 'images';
    for (const f of m.images) {
      const img = document.createElement('img');
      img.src = '/snapshots/' + f;
      img.loading = 'lazy';
      img.addEventListener('click', () => window.open(img.src, '_blank'));
      wrap.appendChild(img);
    }
    bubble.appendChild(wrap);
  }
  div.appendChild(bubble);
  messages.appendChild(div);
  if (m.ts > lastTs) lastTs = m.ts;
}

function isNearBottom() {
  return messages.scrollTop + messages.clientHeight >= messages.scrollHeight - 80;
}

async function poll() {
  try {
    const wasNearBottom = isNearBottom();
    const r = await fetch('/api/messages?since=' + lastTs);
    if (!r.ok) return;
    const msgs = await r.json();
    if (msgs.length) {
      for (const m of msgs) renderMsg(m);
      if (wasNearBottom) messages.scrollTop = messages.scrollHeight;
    }
  } catch {}
}

async function submit() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = '36px';
  sendBtn.disabled = true;
  try {
    await fetch('/api/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    await poll();
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

sendBtn.addEventListener('click', submit);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    submit();
  }
});
input.addEventListener('input', () => {
  input.style.height = '36px';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

poll().then(() => { messages.scrollTop = messages.scrollHeight; });
setInterval(poll, 3000);

const statusBtn = document.getElementById('status');
const statusText = document.getElementById('status-text');

async function pollStatus() {
  try {
    const r = await fetch('/api/status');
    if (!r.ok) return;
    const s = await r.json();
    if (!s.session) {
      statusBtn.className = 'status-pill down';
      statusText.textContent = 'tmux down';
    } else if (s.claude) {
      statusBtn.className = 'status-pill alive';
      statusText.textContent = 'Claude';
    } else {
      statusBtn.className = 'status-pill down';
      statusText.textContent = `restart Claude (${s.cmd || '?'})`;
    }
  } catch {}
}

statusBtn.addEventListener('click', async () => {
  if (!statusBtn.classList.contains('down')) return;
  statusText.textContent = 'restarting…';
  try {
    await fetch('/api/restart-claude', { method: 'POST' });
  } catch {}
  setTimeout(pollStatus, 1500);
});

pollStatus();
setInterval(pollStatus, 5000);
</script>
</body>
</html>
