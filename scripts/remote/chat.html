<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>sd remote chat</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    display: flex;
    flex-direction: column;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", system-ui, sans-serif;
    background: #1a1a1a;
    color: #eee;
    -webkit-text-size-adjust: 100%;
  }
  header {
    padding: 10px 16px;
    background: #2a2a2a;
    border-bottom: 1px solid #444;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    padding-top: env(safe-area-inset-top, 10px);
  }
  .title { font-size: 13px; font-weight: 600; color: #ffa647; }
  .status-pill {
    background: transparent;
    border: 1px solid #555;
    color: #ccc;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
    cursor: default;
  }
  .status-pill.alive { color: #5cd57d; border-color: #2e5a39; }
  .status-pill.down { color: #ff7878; border-color: #5a2e2e; cursor: pointer; }
  .status-pill.down:active { background: #3a1f1f; }
  .status-pill .dot {
    width: 6px; height: 6px; border-radius: 50%; background: #888;
  }
  .status-pill.alive .dot { background: #5cd57d; }
  .status-pill.down .dot { background: #ff7878; }
  .links { font-size: 11px; }
  .links a { color: #888; text-decoration: none; margin-left: 8px; }
  .links a:hover { color: #ccc; }
  main {
    flex: 1;
    overflow-y: auto;
    padding: 12px 12px 0;
    -webkit-overflow-scrolling: touch;
  }
  .msg {
    margin-bottom: 8px;
    display: flex;
  }
  .msg.user { justify-content: flex-end; }
  .msg.agent { justify-content: flex-start; }
  .msg.system { justify-content: center; }
  .bubble {
    max-width: 82%;
    padding: 8px 12px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.45;
    word-wrap: break-word;
    white-space: pre-wrap;
  }
  .user .bubble { background: #0a84ff; color: #fff; border-bottom-right-radius: 4px; }
  .agent .bubble { background: #2a2a2a; color: #eee; border-bottom-left-radius: 4px; }
  .system .bubble {
    background: transparent;
    color: #666;
    font-size: 11px;
    font-style: italic;
    text-align: center;
  }
  .tool-chip {
    font-family: ui-monospace, "SF Mono", Monaco, Menlo, monospace;
    font-size: 11px;
    color: #888;
    padding: 2px 14px 4px;
    margin-bottom: 2px;
    text-align: left;
    line-height: 1.4;
    word-break: break-all;
    user-select: text;
  }
  .tool-chip summary {
    list-style: none;
    cursor: pointer;
    display: block;
    outline: none;
  }
  .tool-chip summary::-webkit-details-marker { display: none; }
  .tool-chip[open] summary .marker { transform: rotate(90deg); display: inline-block; }
  .tool-chip .marker {
    color: #5cd57d;
    margin-right: 6px;
    transition: transform 0.12s ease;
    display: inline-block;
  }
  .tool-chip .tool-name { color: #b0b0b0; }
  .tool-wrap { margin-bottom: 4px; }
  .tool-images {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin: 4px 0 0 16px;
  }
  .tool-images img {
    max-width: 200px;
    max-height: 200px;
    border-radius: 4px;
    background: #fff;
    cursor: pointer;
    border: 1px solid #333;
  }
  .tool-chip pre.raw {
    margin: 4px 0 4px 12px;
    padding: 6px 8px;
    background: #111;
    color: #999;
    border-radius: 4px;
    font-size: 10.5px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 360px;
    overflow-y: auto;
    border-left: 2px solid #2a5a30;
  }
  .agent .bubble { white-space: normal; }
  .agent .bubble p { margin: 0 0 6px; white-space: pre-wrap; }
  .agent .bubble p:last-child { margin-bottom: 0; }
  .agent .bubble pre {
    background: #111;
    color: #c0c0c0;
    padding: 8px 10px;
    border-radius: 6px;
    overflow-x: auto;
    font-size: 12px;
    margin: 4px 0;
    line-height: 1.4;
  }
  .agent .bubble code {
    font-family: ui-monospace, "SF Mono", monospace;
    font-size: 12.5px;
    background: #1c1c1c;
    padding: 1px 4px;
    border-radius: 3px;
  }
  .agent .bubble pre code {
    background: transparent;
    padding: 0;
    font-size: inherit;
  }
  .agent .bubble ul, .agent .bubble ol {
    margin: 2px 0;
    padding-left: 20px;
  }
  .agent .bubble li { margin: 0; }
  .agent .bubble li + li { margin-top: 2px; }
  .agent .bubble li p { margin: 0; }
  .agent .bubble h1, .agent .bubble h2, .agent .bubble h3 {
    margin: 6px 0 2px;
    font-size: 15px;
    font-weight: 600;
  }
  .agent .bubble strong { font-weight: 600; }
  .agent .bubble a { color: #5fa9ff; }
  .agent .bubble blockquote {
    margin: 4px 0;
    padding-left: 10px;
    border-left: 3px solid #444;
    color: #aaa;
  }
  .agent .bubble hr { border: none; border-top: 1px solid #333; margin: 6px 0; }
  .typing {
    color: #888;
    font-size: 13px;
    padding: 6px 14px;
    font-style: italic;
    display: none;
  }
  .typing.show { display: block; }
  .typing .dot {
    display: inline-block;
    animation: blink 1.2s infinite;
  }
  .typing .dot:nth-child(2) { animation-delay: 0.2s; }
  .typing .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }
  .images { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .images img {
    max-width: 200px;
    max-height: 280px;
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
  }
  footer {
    padding: 8px 8px;
    background: #2a2a2a;
    border-top: 1px solid #444;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    padding-bottom: calc(env(safe-area-inset-bottom, 8px) + 8px);
  }
  textarea {
    flex: 1;
    resize: none;
    background: #1a1a1a;
    border: 1px solid #444;
    color: #eee;
    padding: 8px 10px;
    border-radius: 18px;
    font: inherit;
    font-size: 15px;
    height: 36px;
    min-height: 36px;
    max-height: 120px;
    -webkit-appearance: none;
  }
  textarea:focus { outline: none; border-color: #0a84ff; }
  button {
    background: #0a84ff;
    border: none;
    color: white;
    padding: 0 16px;
    border-radius: 18px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    flex-shrink: 0;
    -webkit-appearance: none;
    height: 36px;
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
  <script src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>
</head>
<body>
<div class="preview-panel" id="preview">
  <span class="preview-label" id="preview-label"></span>
  <button class="preview-close" id="preview-close" type="button">close</button>
  <iframe id="preview-iframe" src="about:blank"></iframe>
</div>
<div id="app">
<header>
  <div class="title">sd remote</div>
  <button class="status-pill" id="status" type="button">
    <span class="dot"></span>
    <span id="status-text">checking…</span>
  </button>
  <div class="links">
    <a href="/reveal/index.html" target="_blank">preview</a>
  </div>
</header>
<main id="messages"></main>
<div class="typing" id="typing">Claude is responding<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
<footer>
  <textarea id="input" placeholder="Send a message..." rows="1"></textarea>
  <button id="send">Send</button>
</footer>
</div>
<script>
const messages = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
let lastTs = 0;
const seen = new Set();

function renderMsg(m) {
  if (seen.has(m.id)) return;
  seen.add(m.id);

  // Tool calls render as a small gray monospace line that expands to show the
  // full tool_input JSON when tapped. Attached images (e.g. Read on a PNG)
  // render below the chip as visible thumbnails — the user sees what Claude
  // is looking at, even without expanding.
  if (m.from === 'system' && m.kind === 'tool') {
    const wrap = document.createElement('div');
    wrap.className = 'tool-wrap';
    const det = document.createElement('details');
    det.className = 'tool-chip';
    const sum = document.createElement('summary');
    const space = m.text.indexOf('  ');
    if (space > 0) {
      const tool = m.text.slice(0, space);
      const rest = m.text.slice(space + 2);
      sum.innerHTML = '<span class="marker">▸</span><span class="tool-name">' + escapeHtml(tool) + '</span>  ' + escapeHtml(rest);
    } else {
      sum.innerHTML = '<span class="marker">▸</span>' + escapeHtml(m.text);
    }
    det.appendChild(sum);
    if (m.raw !== undefined && m.raw !== null) {
      const pre = document.createElement('pre');
      pre.className = 'raw';
      try {
        pre.textContent = JSON.stringify(m.raw, null, 2);
      } catch {
        pre.textContent = String(m.raw);
      }
      det.appendChild(pre);
    }
    wrap.appendChild(det);
    if (m.images && m.images.length) {
      const imgs = document.createElement('div');
      imgs.className = 'tool-images';
      for (const f of m.images) {
        const img = document.createElement('img');
        img.src = '/snapshots/' + f;
        img.loading = 'lazy';
        img.addEventListener('click', () => window.open(img.src, '_blank'));
        imgs.appendChild(img);
      }
      wrap.appendChild(imgs);
    }
    messages.appendChild(wrap);
    if (m.ts > lastTs) lastTs = m.ts;
    return;
  }

  const div = document.createElement('div');
  div.className = 'msg ' + m.from;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (m.text) {
    if (m.from === 'agent' && typeof marked !== 'undefined') {
      bubble.innerHTML = marked.parse(m.text, { gfm: true, breaks: true });
    } else {
      const span = document.createElement('span');
      span.textContent = m.text;
      bubble.appendChild(span);
    }
  }
  if (m.images && m.images.length) {
    const wrap = document.createElement('div');
    wrap.className = 'images';
    for (const f of m.images) {
      const img = document.createElement('img');
      img.src = '/snapshots/' + f;
      img.loading = 'lazy';
      img.addEventListener('click', () => window.open(img.src, '_blank'));
      wrap.appendChild(img);
    }
    bubble.appendChild(wrap);
  }
  div.appendChild(bubble);
  messages.appendChild(div);
  if (m.ts > lastTs) lastTs = m.ts;
}

function escapeHtml(s) {
  return String(s)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;');
}

function isNearBottom() {
  return messages.scrollTop + messages.clientHeight >= messages.scrollHeight - 80;
}

async function poll() {
  try {
    const wasNearBottom = isNearBottom();
    const r = await fetch('/api/messages?since=' + lastTs);
    if (!r.ok) return;
    const msgs = await r.json();
    if (msgs.length) {
      for (const m of msgs) renderMsg(m);
      if (wasNearBottom) messages.scrollTop = messages.scrollHeight;
    }
  } catch {}
}

async function submit() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = '36px';
  sendBtn.disabled = true;
  try {
    await fetch('/api/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    await poll();
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

sendBtn.addEventListener('click', submit);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    submit();
  }
});
input.addEventListener('input', () => {
  input.style.height = '36px';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

function appendIfNew(m) {
  const wasNearBottom = isNearBottom();
  renderMsg(m);
  if (wasNearBottom) messages.scrollTop = messages.scrollHeight;
}

// Initial backfill, then connect SSE for live updates. Keep a slow poll as
// a safety net in case SSE silently dies under a proxy.
poll().then(() => { messages.scrollTop = messages.scrollHeight; });

const previewPanel = document.getElementById('preview');
const previewIframe = document.getElementById('preview-iframe');
const previewLabel = document.getElementById('preview-label');
const previewClose = document.getElementById('preview-close');
let currentPreviewUrl = '';
function applyPreview(p) {
  const url = p && p.url ? p.url : '';
  if (url === currentPreviewUrl) return;
  currentPreviewUrl = url;
  if (url) {
    previewIframe.src = url;
    previewLabel.textContent = (p && p.label) || url;
    previewPanel.classList.add('show');
  } else {
    previewPanel.classList.remove('show');
    setTimeout(() => { if (!currentPreviewUrl) previewIframe.src = 'about:blank'; }, 250);
  }
}
previewClose.addEventListener('click', async () => {
  applyPreview(null);
  try { await fetch('/api/preview', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url: '' }) }); } catch {}
});
async function pollPreview() {
  try {
    const r = await fetch('/api/preview');
    if (!r.ok) return;
    const j = await r.json();
    applyPreview(j.preview);
  } catch {}
}
pollPreview();

let es;
function connectSSE() {
  try {
    es = new EventSource('/api/stream');
    es.addEventListener('message', (e) => {
      try {
        const m = JSON.parse(e.data);
        appendIfNew(m);
      } catch {}
    });
    es.addEventListener('preview', (e) => {
      try {
        const j = JSON.parse(e.data);
        applyPreview(j.preview);
      } catch {}
    });
    es.onopen = () => { poll(); pollPreview(); };
    es.onerror = () => { /* EventSource auto-reconnects */ };
  } catch {
    setInterval(poll, 3000);
  }
}
if (typeof EventSource !== 'undefined') {
  connectSSE();
  setInterval(poll, 30000);
} else {
  setInterval(poll, 3000);
}

const statusBtn = document.getElementById('status');
const statusText = document.getElementById('status-text');

const typing = document.getElementById('typing');

async function pollStatus() {
  try {
    const r = await fetch('/api/status');
    if (!r.ok) return;
    const s = await r.json();
    if (!s.session) {
      statusBtn.className = 'status-pill down';
      statusText.textContent = 'tmux down';
    } else if (s.claude) {
      statusBtn.className = 'status-pill alive';
      statusText.textContent = 'Claude';
    } else {
      statusBtn.className = 'status-pill down';
      statusText.textContent = `restart Claude (${s.cmd || '?'})`;
    }
    const wasNearBottom = isNearBottom();
    typing.classList.toggle('show', !!s.responding);
    if (wasNearBottom) messages.scrollTop = messages.scrollHeight;
  } catch {}
}

statusBtn.addEventListener('click', async () => {
  if (!statusBtn.classList.contains('down')) return;
  statusText.textContent = 'restarting…';
  try {
    await fetch('/api/restart-claude', { method: 'POST' });
  } catch {}
  setTimeout(pollStatus, 1500);
});

pollStatus();
setInterval(pollStatus, 5000);
</script>
</body>
</html>
