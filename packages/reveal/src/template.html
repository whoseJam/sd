<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Fixed 960 viewport so mobile browsers don't squeeze the layout when
         this page is loaded directly OR inside a CSS-scaled iframe.
         Reveal's intrinsic width is 960; we let it design at 960 and the
         outer page (chat stage iframe) handles user-facing scale. -->
    <meta name="viewport" content="width=960, initial-scale=1.0">
    <script src="<%= base %>/vendor/font-awesome.js"></script>
    <link rel="stylesheet" href="<%= base %>/vendor/font-awesome.css">
    <script src="<%= base %>/vendor/customcontrols.js"></script>
    <link rel="stylesheet" href="<%= base %>/vendor/customcontrols.css">
</head>
<body>
    <div class="reveal">
        <div class="slides" id="slide-host">
            <div include-html="./ppt.html"></div>
        </div>
    </div>
    <script type="text/javascript" src="<%= base %>/reveal.js"></script>
</body>
</html>
